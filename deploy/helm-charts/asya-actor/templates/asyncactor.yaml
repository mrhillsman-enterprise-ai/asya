{{- $actors := .Values.actors | default (list .Values) }}
{{- range $actors }}
{{- $actor := . }}
{{- $namespace := $actor.namespace | default $.Values.namespace }}
{{- $transport := $actor.transport | default $.Values.transport }}
{{- $scaling := $actor.scaling | default $.Values.default.scaling }}
{{- $timeout := $actor.timeout }}
{{- $image := $actor.image | default $.Values.default.image }}
{{- $imagePullPolicy := $actor.imagePullPolicy | default $.Values.default.imagePullPolicy | default "IfNotPresent" }}
{{- $handler := $actor.handler | default $.Values.default.handler }}
{{- $env := $actor.env | default $.Values.default.env | default list }}
{{- $resources := $actor.resources | default $.Values.default.resources }}
{{- $healthChecks := $actor.healthChecks | default $.Values.default.healthChecks }}
---
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ $actor.name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "asya-actor.labels" $ | nindent 4 }}
spec:
  actor: {{ $actor.name }}
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ $transport }}
  transport: {{ $transport }}

  {{- if $scaling }}
  scaling:
    enabled: {{ $scaling.enabled }}
    {{- if $scaling.enabled }}
    minReplicaCount: {{ $scaling.minReplicaCount }}
    maxReplicaCount: {{ $scaling.maxReplicaCount }}
    pollingInterval: {{ $scaling.pollingInterval }}
    cooldownPeriod: {{ $scaling.cooldownPeriod }}
    queueLength: {{ $scaling.queueLength }}
    {{- if $scaling.advanced }}
    advanced:
      {{- toYaml $scaling.advanced | nindent 6 }}
    {{- end }}
    {{- end }}
  {{- end }}

  {{- if $timeout }}
  timeout:
    {{- toYaml $timeout | nindent 4 }}
  {{- end }}

  image: {{ $image }}
  imagePullPolicy: {{ $imagePullPolicy }}
  handler: {{ $handler }}
  {{- if $env }}
  env:
    {{- toYaml $env | nindent 4 }}
  {{- end }}
  {{- if $resources }}
  resources:
    {{- toYaml $resources | nindent 4 }}
  {{- end }}
{{- end }}
