replicaCount: 1

image:
  repository: ghcr.io/deliveryhero/asya-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
  - host: asya-gateway.local
    paths:
    - path: /
      pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# Gateway configuration
config:
  port: "8080"

# Transport configuration
# Choose exactly one transport to enable; all others should be disabled
transports:
  rabbitmq:
    enabled: false
    config:
      url: "amqp://guest:guest@rabbitmq:5672/"
      exchange: "asya"
      poolSize: 20

  sqs:
    enabled: false
    config:
      endpoint: "" # Leave empty for AWS SQS; set to http://sqs:4566 for LocalStack
      region: "us-east-1"
      visibilityTimeout: 300
      waitTimeSeconds: 20

  pubsub:
    enabled: false
    config:
      projectId: ""
      endpoint: ""

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    database: asya_gateway
    username: asya
    password: asya-password # Change in production!
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        memory: 256Mi
      requests:
        memory: 128Mi

# Database migration job
migration:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  backoffLimit: 5

# Flow registry ConfigMap configuration.
# The gateway-flows ConfigMap is managed externally (by actors via RBAC or manually).
# The gateway hot-reloads flows.yaml when the ConfigMap changes.
flowsConfig:
  # mountPath is the directory where flows.yaml is mounted inside the gateway containers.
  mountPath: /etc/asya/flows
  # exposerGroup is the Kubernetes Group bound to the flow-exposer RBAC Role,
  # allowing members to patch the gateway-flows ConfigMap.
  exposerGroup: "asya-flow-exposers"
  # flows is the list of FlowConfig entries seeded into the gateway-flows ConfigMap at deploy time.
  # Each entry maps to an MCP tool and/or A2A skill exposed by the gateway.
  flows: []

# External database (if postgresql.enabled=false)
# Leave host empty to use in-memory store (no persistence)
externalDatabase:
  host: "" # Set to hostname for external PostgreSQL, or leave empty for in-memory store
  port: 5432
  database: asya_gateway
  username: asya
  password: "" # Password for external database (only used if existingSecret is not set)
  existingSecret: "" # Name of existing secret containing database password (recommended)
  existingSecretKey: password # Key in existingSecret that contains the password

# Test image configuration (for Helm test pods)
# Override to use a pre-loaded image in Kind clusters
tests:
  image: alpine/k8s:1.28.3
  imagePullPolicy: IfNotPresent
