{{- if and .Values.migration.enabled .Values.routes.tools -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "asya-gateway.fullname" . }}-tool-seed
  labels:
    {{- include "asya-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: tool-seed
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      name: {{ include "asya-gateway.fullname" . }}-tool-seed
      labels:
        {{- include "asya-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tool-seed
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: wait-for-db
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          echo "[.] Waiting for PostgreSQL and tools table..."
          until pg_isready -h {{ include "asya-gateway.databaseHost" . }} -p {{ include "asya-gateway.databasePort" . }} -U {{ include "asya-gateway.databaseUsername" . }}; do
            echo "[.] Database not ready, retrying..."
            sleep 2
          done

          until psql -h {{ include "asya-gateway.databaseHost" . }} \
                      -p {{ include "asya-gateway.databasePort" . }} \
                      -U {{ include "asya-gateway.databaseUsername" . }} \
                      -d {{ include "asya-gateway.databaseName" . }} \
                      -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='tools'" | grep -q 1; do
            echo "[.] Waiting for tools table (migration may still be running)..."
            sleep 2
          done
          echo "[+] Database and tools table ready"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "asya-gateway.databaseSecretName" . }}
              key: {{ include "asya-gateway.databasePasswordKey" . }}
      containers:
      - name: seed-tools
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          set -e
          echo "[.] Seeding tools into database..."
          psql -h {{ include "asya-gateway.databaseHost" . }} \
               -p {{ include "asya-gateway.databasePort" . }} \
               -U {{ include "asya-gateway.databaseUsername" . }} \
               -d {{ include "asya-gateway.databaseName" . }} \
               -f /seed/tools-seed.sql
          echo "[+] Tool seeding completed"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "asya-gateway.databaseSecretName" . }}
              key: {{ include "asya-gateway.databasePasswordKey" . }}
        volumeMounts:
        - name: tool-seed
          mountPath: /seed
          readOnly: true
        resources:
          {{- toYaml .Values.migration.resources | nindent 10 }}
      volumes:
      - name: tool-seed
        configMap:
          name: {{ include "asya-gateway.fullname" . }}-tool-seed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "asya-gateway.fullname" . }}-tool-seed
  labels:
    {{- include "asya-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: tool-seed
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  tools-seed.sql: |
    {{- range .Values.routes.tools }}
    INSERT INTO tools (name, actor, route_next, description, parameters, timeout_sec, progress, mcp_enabled, a2a_enabled)
    VALUES (
      {{ .name | squote }},
      {{ index .route 0 | squote }},
      {{- if gt (len .route) 1 }}
      '{ {{- range $i, $v := (slice .route 1) }}{{- if $i }},{{ end }}{{ $v }}{{- end }} }',
      {{- else }}
      '{}',
      {{- end }}
      {{ .description | trim | replace "\n" " " | squote }},
      {{- if .parameters }}
      {{ .parameters | toJson | squote }},
      {{- else }}
      '{}',
      {{- end }}
      {{ .timeout | default 300 }},
      {{ .progress | default false }},
      {{ if and .mcp (hasKey .mcp "enabled") (not .mcp.enabled) }}false{{ else }}true{{ end }},
      {{ if and .a2a .a2a.enabled }}true{{ else }}false{{ end }}
    )
    ON CONFLICT (name) DO UPDATE SET
      actor = EXCLUDED.actor,
      route_next = EXCLUDED.route_next,
      description = EXCLUDED.description,
      parameters = EXCLUDED.parameters,
      timeout_sec = EXCLUDED.timeout_sec,
      progress = EXCLUDED.progress,
      mcp_enabled = EXCLUDED.mcp_enabled,
      a2a_enabled = EXCLUDED.a2a_enabled;
    {{- end }}
{{- end }}
