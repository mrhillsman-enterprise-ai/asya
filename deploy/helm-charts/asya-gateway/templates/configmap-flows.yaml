apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "asya-gateway.fullname" . }}-flows
  labels:
    {{- include "asya-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: flows
    asya.sh/config-type: flows
data:
  flows.yaml: |
    {{- toYaml (dict "flows" .Values.flowsConfig.flows) | nindent 4 }}
