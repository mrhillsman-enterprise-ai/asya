apiVersion: v1
kind: Service
metadata:
  name: {{ include "asya-gateway.mesh.fullname" . }}
  labels:
    {{- include "asya-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: mesh
spec:
  type: {{ .Values.service.meshType | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq (.Values.service.meshType | default "ClusterIP") "NodePort") .Values.service.meshNodePort }}
      nodePort: {{ .Values.service.meshNodePort }}
      {{- end }}
  selector:
    {{- include "asya-gateway.mesh.selectorLabels" . | nindent 4 }}
