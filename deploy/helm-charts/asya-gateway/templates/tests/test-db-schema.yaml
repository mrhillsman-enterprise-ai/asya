{{- if or .Values.postgresql.enabled .Values.externalDatabase.host -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "asya-gateway.fullname" . }}-test-db-schema"
  labels:
    {{- include "asya-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test-db-schema
    image: postgres:15-alpine
    command:
    - sh
    - -c
    - |
      set -e
      echo "[.] Testing database schema..."

      # Wait for database to be ready
      until pg_isready -h {{ include "asya-gateway.databaseHost" . }} -p {{ include "asya-gateway.databasePort" . }} -U {{ include "asya-gateway.databaseUsername" . }}; do
        echo "[.] Waiting for database..."
        sleep 2
      done
      echo "[+] Database is reachable"

      # Check if tasks table exists with correct schema
      echo "[.] Verifying tasks table..."
      TASKS_EXISTS=$(psql -h {{ include "asya-gateway.databaseHost" . }} \
                          -p {{ include "asya-gateway.databasePort" . }} \
                          -U {{ include "asya-gateway.databaseUsername" . }} \
                          -d {{ include "asya-gateway.databaseName" . }} \
                          -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='tasks'")

      if [ "$TASKS_EXISTS" -ne 1 ]; then
        echo "[-] tasks table does not exist!"
        exit 1
      fi
      echo "[+] tasks table exists"

      # Check if task_updates table exists
      echo "[.] Verifying task_updates table..."
      UPDATES_EXISTS=$(psql -h {{ include "asya-gateway.databaseHost" . }} \
                            -p {{ include "asya-gateway.databasePort" . }} \
                            -U {{ include "asya-gateway.databaseUsername" . }} \
                            -d {{ include "asya-gateway.databaseName" . }} \
                            -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='task_updates'")

      if [ "$UPDATES_EXISTS" -ne 1 ]; then
        echo "[-] task_updates table does not exist!"
        exit 1
      fi
      echo "[+] task_updates table exists"

      # Verify critical columns in tasks table
      echo "[.] Verifying tasks table schema..."
      REQUIRED_COLUMNS="id status route_prev route_curr route_next created_at updated_at"
      for col in $REQUIRED_COLUMNS; do
        COL_EXISTS=$(psql -h {{ include "asya-gateway.databaseHost" . }} \
                          -p {{ include "asya-gateway.databasePort" . }} \
                          -U {{ include "asya-gateway.databaseUsername" . }} \
                          -d {{ include "asya-gateway.databaseName" . }} \
                          -tAc "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='public' AND table_name='tasks' AND column_name='$col'")

        if [ "$COL_EXISTS" -ne 1 ]; then
          echo "[-] Required column '$col' does not exist in tasks table!"
          exit 1
        fi
      done
      echo "[+] All required columns exist in tasks table"

      # Test that we can insert and query (basic sanity check)
      echo "[.] Testing database write/read..."
      psql -h {{ include "asya-gateway.databaseHost" . }} \
           -p {{ include "asya-gateway.databasePort" . }} \
           -U {{ include "asya-gateway.databaseUsername" . }} \
           -d {{ include "asya-gateway.databaseName" . }} \
           -c "INSERT INTO tasks (id, status, route_prev, route_curr, route_next) VALUES ('test-schema-validation', 'pending', ARRAY[]::text[], 'test-actor', ARRAY[]::text[]) ON CONFLICT (id) DO NOTHING;"

      RESULT=$(psql -h {{ include "asya-gateway.databaseHost" . }} \
                    -p {{ include "asya-gateway.databasePort" . }} \
                    -U {{ include "asya-gateway.databaseUsername" . }} \
                    -d {{ include "asya-gateway.databaseName" . }} \
                    -tAc "SELECT status FROM tasks WHERE id='test-schema-validation'")

      if [ "$RESULT" != "pending" ]; then
        echo "[-] Database write/read test failed!"
        exit 1
      fi
      echo "[+] Database write/read test passed"

      # Cleanup test data
      psql -h {{ include "asya-gateway.databaseHost" . }} \
           -p {{ include "asya-gateway.databasePort" . }} \
           -U {{ include "asya-gateway.databaseUsername" . }} \
           -d {{ include "asya-gateway.databaseName" . }} \
           -c "DELETE FROM tasks WHERE id='test-schema-validation';"

      echo "[+] Database schema validation completed successfully"
    env:
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: {{ include "asya-gateway.databaseSecretName" . }}
          key: {{ include "asya-gateway.databasePasswordKey" . }}
{{- end }}
