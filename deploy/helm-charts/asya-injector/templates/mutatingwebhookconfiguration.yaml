apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "asya-injector.fullname" . }}
  labels:
    {{- include "asya-injector.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "asya-injector.certificateName" . }}
  {{- end }}
webhooks:
- name: inject.asya.sh
  clientConfig:
    service:
      name: {{ include "asya-injector.fullname" . }}
      namespace: {{ .Release.Namespace }}
      path: /mutate
      port: {{ .Values.service.port }}
    {{- if not .Values.certManager.enabled }}
    # When not using cert-manager, you must provide the CA bundle manually
    caBundle: ""
    {{- end }}
  rules:
  - operations:
    - CREATE
    apiGroups:
    - ""
    apiVersions:
    - v1
    resources:
    - pods
    scope: Namespaced
  {{- with .Values.webhook.namespaceSelector }}
  namespaceSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.webhook.objectSelector }}
  objectSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  failurePolicy: {{ .Values.webhook.failurePolicy }}
  sideEffects: None
  admissionReviewVersions:
  - v1
  timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
  reinvocationPolicy: Never
