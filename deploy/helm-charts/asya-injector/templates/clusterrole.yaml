apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "asya-injector.fullname" . }}
  labels:
    {{- include "asya-injector.labels" . | nindent 4 }}
rules:
# Read AsyncActor claims (Crossplane resources)
- apiGroups:
  - asya.sh
  resources:
  - asyncactors
  verbs:
  - get
  - list
  - watch
# Read XAsyncActors (Crossplane composite resources)
- apiGroups:
  - asya.sh
  resources:
  - xasyncactors
  verbs:
  - get
  - list
  - watch
