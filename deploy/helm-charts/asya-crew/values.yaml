# Default values for asya-crew chart
# Deploys system actors with reserved roles (x-sink, x-sump, checkpoint-s3)
#
# IMPORTANT: ASYA_HANDLER is pre-configured by the Helm templates and MUST NOT be overridden in values.

# Global image configuration
image:
  repository: ghcr.io/deliveryhero/asya-crew
  pullPolicy: IfNotPresent
  # tag defaults to Chart.appVersion if not specified

# X-sink actor configuration
# First layer of two-layer termination: reports final status to gateway, routes to hooks
x-sink:
  enabled: true
  name: x-sink
  transport: "" # required

  # Sidecar configuration (passed to AsyncActor.spec.sidecar)
  # Use this to configure sidecar environment variables, resources, etc.
  sidecar: {}
  # Example:
  #   env:
  #   - name: AWS_ACCESS_KEY_ID
  #     value: "test"

  # Image overrides (optional, uses global image config by default)
  image:
    repository: ""
    tag: ""
    pullPolicy: ""

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # KEDA autoscaling configuration
  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 5

  # Workload configuration
  workload:
    kind: Deployment

  # Additional annotations for AsyncActor CR
  annotations: {}

  # Environment variables
  # DO NOT set ASYA_HANDLER - it is pre-configured by the Helm template and cannot be overridden
  env:
    # Comma-separated list of hook actor names (optional)
    # Example: "checkpoint-s3,notify-slack"
    ASYA_SINK_HOOKS: ""

# X-sump actor configuration
# Second layer of two-layer termination: final terminal, emits metrics, logs errors
x-sump:
  enabled: true
  name: x-sump
  transport: "" # required

  # Sidecar configuration (passed to AsyncActor.spec.sidecar)
  # Use this to configure sidecar environment variables, resources, etc.
  sidecar: {}
  # Example:
  #   env:
  #   - name: AWS_ACCESS_KEY_ID
  #     value: "test"

  # Image overrides (optional, uses global image config by default)
  image:
    repository: ""
    tag: ""
    pullPolicy: ""

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # KEDA autoscaling configuration
  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 5

  # Workload configuration
  workload:
    kind: Deployment

  # Additional annotations for AsyncActor CR
  annotations: {}

  # Environment variables
  # DO NOT set ASYA_HANDLER - it is pre-configured by the Helm template and cannot be overridden
  env: {}

# Checkpoint actor configuration
# Message persistence via state proxy (can be used as hook or mid-pipeline checkpoint)
# Storage backend is determined by the state proxy connector configured externally
checkpoint-s3:
  enabled: false
  name: checkpoint-s3
  transport: "" # required

  # Sidecar configuration (passed to AsyncActor.spec.sidecar)
  # Use this to configure sidecar environment variables, resources, etc.
  sidecar: {}
  # Example:
  #   env:
  #   - name: AWS_ACCESS_KEY_ID
  #     value: "test"

  # Image overrides (optional, uses global image config by default)
  image:
    repository: ""
    tag: ""
    pullPolicy: ""

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # KEDA autoscaling configuration
  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 5

  # Workload configuration
  workload:
    kind: Deployment

  # Additional annotations for AsyncActor CR
  annotations: {}

  # Environment variables
  # DO NOT set ASYA_HANDLER - it is pre-configured by the Helm template and cannot be overridden
  env:
    # State proxy mount path for checkpoint storage
    ASYA_PERSISTENCE_MOUNT: ""

# X-pause actor configuration
# Pause handler: persists message state, signals pause via header
x-pause:
  enabled: false
  name: x-pause
  transport: "" # required

  # Sidecar configuration (passed to AsyncActor.spec.sidecar)
  # Use this to configure sidecar environment variables, resources, etc.
  sidecar: {}
  # Example:
  #   env:
  #   - name: AWS_ACCESS_KEY_ID
  #     value: "test"

  # Image overrides (optional, uses global image config by default)
  image:
    repository: ""
    tag: ""
    pullPolicy: ""

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # KEDA autoscaling configuration
  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 5

  # Workload configuration
  workload:
    kind: Deployment

  # Additional annotations for AsyncActor CR
  annotations: {}

  # Environment variables
  # DO NOT set ASYA_HANDLER - it is pre-configured by the Helm template and cannot be overridden
  env:
    # State proxy mount path for message persistence (required)
    ASYA_PERSISTENCE_MOUNT: ""
    # Optional JSON pause metadata schema (prompt + fields for UI rendering)
    ASYA_PAUSE_METADATA: ""

# X-resume actor configuration
# Resume handler: loads persisted message, merges user input, continues route
x-resume:
  enabled: false
  name: x-resume
  transport: "" # required

  # Sidecar configuration (passed to AsyncActor.spec.sidecar)
  # Use this to configure sidecar environment variables, resources, etc.
  sidecar: {}
  # Example:
  #   env:
  #   - name: AWS_ACCESS_KEY_ID
  #     value: "test"

  # Image overrides (optional, uses global image config by default)
  image:
    repository: ""
    tag: ""
    pullPolicy: ""

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # KEDA autoscaling configuration
  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 5

  # Workload configuration
  workload:
    kind: Deployment

  # Additional annotations for AsyncActor CR
  annotations: {}

  # Environment variables
  # DO NOT set ASYA_HANDLER - it is pre-configured by the Helm template and cannot be overridden
  env:
    # State proxy mount path for loading persisted messages (required)
    ASYA_PERSISTENCE_MOUNT: ""
    # Merge mode for user input: "shallow" (default) or "deep"
    ASYA_RESUME_MERGE_MODE: ""

# DLQ Worker configuration
# Standalone Go binary for processing transport-level Dead Letter Queue messages.
# NOT an AsyncActor - deployed as a regular Kubernetes Deployment.
# See src/asya-crew/cmd/dlq-worker/README.md for architecture and rationale.
dlq-worker:
  enabled: true

  # Image configuration (separate from crew actor images)
  image:
    repository: ghcr.io/deliveryhero/asya-dlq-worker
    tag: "" # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  # DLQ worker configuration (all mapped to environment variables)
  config:
    # Full SQS queue URL for the DLQ (required to activate deployment)
    # When empty, the Deployment is not rendered even if enabled: true
    queueURL: ""
    # Transport type (currently only "sqs" supported)
    transport: sqs
    # AWS region for SQS
    region: us-east-1
    # Gateway URL for reporting failure status (optional, empty = disabled)
    gatewayURL: ""
    # S3 bucket for message persistence (optional, empty = stdout mode)
    s3Bucket: ""
    # Custom S3 endpoint for MinIO or LocalStack (optional)
    s3Endpoint: ""
    # S3 key prefix for stored messages (optional, default: dlq/)
    s3Prefix: ""
    # Log level: DEBUG, INFO, WARN, ERROR (optional, default: INFO)
    logLevel: ""

  # Extra environment variables (e.g. AWS credentials for development)
  env: {}
  # Example:
  #   AWS_ACCESS_KEY_ID: "test"
  #   AWS_SECRET_ACCESS_KEY: "test"

  # Resource limits and requests
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Additional annotations for the Deployment
  annotations: {}

  # Image pull secrets
  imagePullSecrets: []

  # Service account configuration (for IRSA in production)
  serviceAccount:
    create: false
    annotations: {}
    # Example for IRSA:
    #   eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/dlq-worker-role"
