{{- $sump := index .Values "x-sump" }}
{{- if $sump.enabled }}
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ $sump.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-crew.x-sump.labels" . | nindent 4 }}
  {{- with $sump.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  actor: {{ $sump.name }}
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ $sump.transport }}
  transport: {{ $sump.transport }}

  {{- with $sump.sidecar }}
  sidecar:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- if $sump.scaling.enabled }}
  scaling:
    {{- toYaml $sump.scaling | nindent 4 }}
  {{- end }}

  workload:
    kind: {{ $sump.workload.kind }}
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ include "asya-crew.x-sump.image" . }}
          imagePullPolicy: {{ include "asya-crew.x-sump.imagePullPolicy" . }}
          env:
          {{- range $key, $value := $sump.env }}
          {{- if ne $value "" }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          {{- end }}
          - name: ASYA_HANDLER
            value: asya_crew.sump.sump_handler
          - name: ASYA_HANDLER_MODE
            value: envelope
          - name: ASYA_ENABLE_VALIDATION
            value: "false"
          {{- with $sump.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
