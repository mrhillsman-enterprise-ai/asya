{{- $errorEnd := index .Values "error-end" }}
{{- if $errorEnd.enabled }}
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ $errorEnd.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-crew.error-end.labels" . | nindent 4 }}
  {{- with $errorEnd.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  transport: {{ $errorEnd.transport }}

  {{- if $errorEnd.scaling.enabled }}
  scaling:
    {{- toYaml $errorEnd.scaling | nindent 4 }}
  {{- end }}

  workload:
    kind: {{ $errorEnd.workload.kind }}
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ include "asya-crew.error-end.image" . }}
          imagePullPolicy: {{ include "asya-crew.error-end.imagePullPolicy" . }}
          env:
          {{- range $key, $value := $errorEnd.env }}
          {{- if ne $value "" }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          {{- end }}
          - name: ASYA_HANDLER
            value: handlers.end_handlers.error_end_handler
          - name: ASYA_HANDLER_MODE
            value: envelope
          - name: ASYA_ENABLE_VALIDATION
            value: "false"
          {{- with $errorEnd.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
