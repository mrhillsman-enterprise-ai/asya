{{- $pause := index .Values "x-pause" }}
{{- if $pause.enabled }}
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ $pause.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-crew.x-pause.labels" . | nindent 4 }}
  {{- with $pause.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  actor: {{ $pause.name }}
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ $pause.transport }}
  transport: {{ $pause.transport }}

  {{- with $pause.sidecar }}
  sidecar:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- if $pause.scaling.enabled }}
  scaling:
    {{- toYaml $pause.scaling | nindent 4 }}
  {{- end }}

  image: {{ include "asya-crew.x-pause.image" . }}
  imagePullPolicy: {{ include "asya-crew.x-pause.imagePullPolicy" . }}
  handler: asya_crew.pause.pause_handler
  {{- $envList := list }}
  {{- range $key, $value := $pause.env }}
  {{- if ne $value "" }}
  {{- $envList = append $envList (dict "name" $key "value" $value) }}
  {{- end }}
  {{- end }}
  {{- if $envList }}
  env:
    {{- toYaml $envList | nindent 4 }}
  {{- end }}
  {{- with $pause.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
