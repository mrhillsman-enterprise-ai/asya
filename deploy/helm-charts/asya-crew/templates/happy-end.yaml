{{- $happyEnd := index .Values "happy-end" }}
{{- if $happyEnd.enabled }}
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ $happyEnd.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-crew.happy-end.labels" . | nindent 4 }}
  {{- with $happyEnd.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  actor: {{ $happyEnd.name }}
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ $happyEnd.transport }}
  transport: {{ $happyEnd.transport }}

  {{- with $happyEnd.sidecar }}
  sidecar:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- if $happyEnd.scaling.enabled }}
  scaling:
    {{- toYaml $happyEnd.scaling | nindent 4 }}
  {{- end }}

  workload:
    kind: {{ $happyEnd.workload.kind }}
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ include "asya-crew.happy-end.image" . }}
          imagePullPolicy: {{ include "asya-crew.happy-end.imagePullPolicy" . }}
          env:
          {{- range $key, $value := $happyEnd.env }}
          {{- if ne $value "" }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          {{- end }}
          - name: ASYA_HANDLER
            value: handlers.end_handlers.happy_end_handler
          - name: ASYA_HANDLER_MODE
            value: envelope
          - name: ASYA_ENABLE_VALIDATION
            value: "false"
          {{- with $happyEnd.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
