{{- $resume := index .Values "x-resume" }}
{{- if $resume.enabled }}
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ $resume.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-crew.x-resume.labels" . | nindent 4 }}
  {{- with $resume.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  actor: {{ $resume.name }}
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ $resume.transport }}
  transport: {{ $resume.transport }}

  {{- with $resume.sidecar }}
  sidecar:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- if $resume.scaling.enabled }}
  scaling:
    {{- toYaml $resume.scaling | nindent 4 }}
  {{- end }}

  image: {{ include "asya-crew.x-resume.image" . }}
  imagePullPolicy: {{ include "asya-crew.x-resume.imagePullPolicy" . }}
  handler: asya_crew.resume.resume_handler
  {{- $envList := list }}
  {{- range $key, $value := $resume.env }}
  {{- if ne $value "" }}
  {{- $envList = append $envList (dict "name" $key "value" $value) }}
  {{- end }}
  {{- end }}
  {{- if $envList }}
  env:
    {{- toYaml $envList | nindent 4 }}
  {{- end }}
  {{- with $resume.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
