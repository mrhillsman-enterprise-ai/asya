{{- if .Values.helloActor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-handler
  namespace: {{ .Release.Namespace }}
  labels:
    app: hello-actor
    app.kubernetes.io/name: hello-actor
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  hello_handler.py: |
    """Simple hello-world handler for Asya testing"""

    def process(payload: dict) -> dict:
        """Greet the user by name"""
        name = payload.get("name", "World")
        return {
            "greeting": f"Hello, {name}!",
            "message": "Welcome to Asya🎭 Actor Mesh"
        }
---
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: {{ .Values.helloActor.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: hello-actor
spec:
  actor: {{ .Values.helloActor.name }}
  transport: {{ .Values.global.transport }}

  {{- if eq .Values.global.transport "sqs" }}
  sidecar:
    env:
    - name: AWS_ACCESS_KEY_ID
      value: "test"
    - name: AWS_SECRET_ACCESS_KEY
      value: "test"
    - name: AWS_REGION
      value: "us-east-1"
  {{- end }}

  image: {{ .Values.helloActor.image.repository }}:{{ .Values.helloActor.image.tag }}
  handler: {{ .Values.helloActor.handler }}
  env:
  - name: PYTHONPATH
    value: /app
  volumeMounts:
  - name: handler
    mountPath: /app
  volumes:
  - name: handler
    configMap:
      name: hello-handler
  resources:
    {{- toYaml .Values.helloActor.resources | nindent 4 }}

  scaling:
    enabled: true
    minReplicaCount: {{ .Values.helloActor.scaling.minReplicaCount }}
    maxReplicaCount: {{ .Values.helloActor.scaling.maxReplicaCount }}
    pollingInterval: {{ .Values.helloActor.scaling.pollingInterval }}
    queueLength: {{ .Values.helloActor.scaling.queueLength }}
{{- end }}
