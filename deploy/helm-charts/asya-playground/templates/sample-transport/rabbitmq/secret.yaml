{{- if and .Values.sampleTransport.rabbitmq.enabled (eq .Values.global.transport "rabbitmq") }}
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: {{ include "asya-playground.namespace.infra" . }}
  labels:
    app: rabbitmq
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ .Values.sampleTransport.rabbitmq.auth.password | quote }}
{{- end }}
