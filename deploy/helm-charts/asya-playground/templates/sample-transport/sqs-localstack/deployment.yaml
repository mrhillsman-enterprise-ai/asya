{{- if and .Values.sampleTransport.sqsLocalstack.enabled (eq .Values.global.transport "sqs") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack-sqs
  namespace: {{ include "asya-playground.namespace.infra" . }}
  labels:
    app: localstack-sqs
    app.kubernetes.io/name: localstack-sqs
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: sample-transport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack-sqs
  template:
    metadata:
      labels:
        app: localstack-sqs
    spec:
      containers:
      - name: localstack
        image: {{ .Values.sampleTransport.sqsLocalstack.image.repository }}:{{ .Values.sampleTransport.sqsLocalstack.image.tag }}
        ports:
        - containerPort: 4566
          name: edge
        env:
        - name: SERVICES
          value: "sqs"
        - name: DEBUG
          value: "0"
        - name: DATA_DIR
          value: /tmp/localstack/data
        resources:
          {{- toYaml .Values.sampleTransport.sqsLocalstack.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /_localstack/health
            port: 4566
          initialDelaySeconds: 10
          periodSeconds: 5
{{- end }}
