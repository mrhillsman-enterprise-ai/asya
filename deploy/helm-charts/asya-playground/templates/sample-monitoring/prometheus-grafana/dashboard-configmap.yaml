{{- if .Values.sampleMonitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: asya-grafana-dashboard
  namespace: {{ include "asya-playground.namespace.monitoring" . }}
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Asya"
data:
  asya-actors-overview.json: |
{{ .Files.Get "files/asya-actors-overview.json" | indent 4 }}
{{- end }}
