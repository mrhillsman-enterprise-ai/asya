{{- if and .Values.sampleStorage.minio.enabled (eq .Values.global.storage "minio") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ include "asya-playground.namespace.infra" . }}
  labels:
    app: minio
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: {{ .Values.sampleStorage.minio.image.repository }}:{{ .Values.sampleStorage.minio.image.tag }}
        args:
        - server
        - /data
        - --console-address
        - :9001
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: rootUser
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: rootPassword
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          {{- toYaml .Values.sampleStorage.minio.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
{{- if not .Values.sampleStorage.minio.persistence.enabled }}
      - name: data
        emptyDir: {}
{{- else }}
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
{{- end }}
{{- end }}
