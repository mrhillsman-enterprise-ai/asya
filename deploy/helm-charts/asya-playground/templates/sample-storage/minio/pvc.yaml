{{- if and .Values.sampleStorage.minio.enabled (eq .Values.global.storage "minio") .Values.sampleStorage.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: {{ include "asya-playground.namespace.infra" . }}
  labels:
    app: minio
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.sampleStorage.minio.persistence.size }}
{{- end }}
