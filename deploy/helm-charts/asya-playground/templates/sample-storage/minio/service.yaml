{{- if and .Values.sampleStorage.minio.enabled (eq .Values.global.storage "minio") }}
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ include "asya-playground.namespace.infra" . }}
  labels:
    app: minio
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.sampleStorage.minio.service.type }}
  ports:
  - port: {{ .Values.sampleStorage.minio.service.apiPort }}
    targetPort: api
    protocol: TCP
    name: api
  - port: {{ .Values.sampleStorage.minio.service.consolePort }}
    targetPort: console
    protocol: TCP
    name: console
  selector:
    app: minio
{{- end }}
