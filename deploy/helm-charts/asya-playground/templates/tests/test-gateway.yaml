{{- if .Values.enableAsyaGateway -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: asya-bundle
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: curlimages/curl:latest
    command:
    - sh
    - -c
    - |
      set -e
      echo "Testing gateway health endpoint..."
      curl -f http://asya-gateway.{{ .Release.Namespace }}/health
      echo "Gateway is healthy!"
{{- end }}
