apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-injector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: asya-bundle
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: curlimages/curl:latest
    command:
    - sh
    - -c
    - |
      set -e
      echo "Testing injector webhook health endpoint..."
      curl -f -k https://asya-injector.{{ .Release.Namespace }}:443/healthz
      echo "Injector webhook is healthy!"
