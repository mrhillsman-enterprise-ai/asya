apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-test-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: asya-bundle
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-test-role
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: asya-bundle
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: ["asya.sh"]
  resources: ["asyncactors"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-test-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: asya-bundle
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-test-role
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-test-sa
  namespace: {{ .Release.Namespace }}
