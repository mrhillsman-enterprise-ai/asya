{{- if .Values.providers.gcp.enabled }}
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: asyncactor-pubsub
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
    crossplane.io/xrd: xasyncactors.asya.sh
    asya.sh/transport: pubsub
spec:
  compositeTypeRef:
    apiVersion: asya.sh/v1alpha1
    kind: XAsyncActor
  mode: Pipeline
  pipeline:
    # Extract user labels into pipeline context, filtering system prefixes
    - step: extract-user-labels
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $userLabels := dict -}}`}}
            {{`{{- range $k, $v := $xr.metadata.labels -}}`}}
              {{`{{- if not (or (hasPrefix "crossplane.io/" $k) (hasPrefix "app.kubernetes.io/" $k)) -}}`}}
                {{`{{- $_ := set $userLabels $k $v -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: Context
            data:
              "asya/user-labels":
                {{`{{- $userLabels | toYaml | nindent 4 }}`}}

    {{- if .Values.functions.flavorsEnabled }}
    # Resolve actor flavors -- merges EnvironmentConfig flavor data and writes
    # the resolved spec back onto the XR's desired state for downstream steps.
    # Actors without spec.flavors are passed through with no changes.
    - step: resolve-flavors
      functionRef:
        name: function-asya-flavors
    {{- end }}

    # Create Pub/Sub Topic
    - step: render-pubsub-topic
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $namespace := index $xr.metadata.labels "crossplane.io/claim-namespace" -}}`}}
            {{`{{- $actorName := $xr.spec.actor -}}`}}
            {{`{{- $gcpProject := "`}}{{ .Values.gcpProviderConfig.projectId }}{{`" -}}`}}
            {{`{{- $providerConfigRef := "`}}{{ .Values.gcpProviderConfig.name }}{{`" -}}`}}
            apiVersion: pubsub.gcp.upbound.io/v1beta2
            kind: Topic
            metadata:
              annotations:
                crossplane.io/external-name: asya-{{`{{ $namespace }}`}}-{{`{{ $actorName }}`}}
                gotemplating.fn.crossplane.io/composition-resource-name: pubsub-topic
            spec:
              forProvider:
                project: {{`{{ $gcpProject }}`}}
              providerConfigRef:
                name: {{`{{ $providerConfigRef }}`}}
              deletionPolicy: Delete

    # Create Pub/Sub Subscription
    - step: render-pubsub-subscription
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $namespace := index $xr.metadata.labels "crossplane.io/claim-namespace" -}}`}}
            {{`{{- $actorName := $xr.spec.actor -}}`}}
            {{`{{- $gcpProject := "`}}{{ .Values.gcpProviderConfig.projectId }}{{`" -}}`}}
            {{`{{- $providerConfigRef := "`}}{{ .Values.gcpProviderConfig.name }}{{`" -}}`}}
            apiVersion: pubsub.gcp.upbound.io/v1beta2
            kind: Subscription
            metadata:
              annotations:
                crossplane.io/external-name: asya-{{`{{ $namespace }}`}}-{{`{{ $actorName }}`}}
                gotemplating.fn.crossplane.io/composition-resource-name: pubsub-subscription
            spec:
              forProvider:
                project: {{`{{ $gcpProject }}`}}
                topicSelector:
                  matchControllerRef: true
                ackDeadlineSeconds: 300
                messageRetentionDuration: "604800s"
                expirationPolicy:
                  ttl: ""
              providerConfigRef:
                name: {{`{{ $providerConfigRef }}`}}
              deletionPolicy: Delete
              {{- if .Values.gcpProviderConfig.emulatorHost }}
              # TODO: Subscription updates are not verified in E2E tests when using the Pub/Sub emulator.
              # The Upbound GCP provider (Terraform-based) sends camelCase field masks (e.g. ackDeadlineSeconds),
              # but the emulator only accepts snake_case (ack_deadline_seconds).
              # This is a known parity gap in the emulator's UpdateSubscription RPC.
              # Proof: https://github.com/googleapis/nodejs-pubsub/issues/1029
              # Official Limitations: https://cloud.google.com/pubsub/docs/emulator#known_limitations
              managementPolicies: ["Create", "Observe", "Delete"]
              {{- end }}

    # Create KEDA TriggerAuthentication for GCP Pub/Sub scaling
    - step: render-triggerauthentication
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $namespace := index $xr.metadata.labels "crossplane.io/claim-namespace" -}}`}}
            {{`{{- $actorName := $xr.spec.actor -}}`}}
            {{`{{- $userLabels := dict -}}`}}
            {{`{{- if and .context (index .context "asya/user-labels") -}}`}}
              {{`{{- $userLabels = index .context "asya/user-labels" -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $scalingEnabled := true -}}`}}
            {{`{{- if hasKey $xr.spec "scaling" -}}`}}
              {{`{{- if hasKey $xr.spec.scaling "enabled" -}}`}}
                {{`{{- $scalingEnabled = $xr.spec.scaling.enabled -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            {{`{{- if $scalingEnabled -}}`}}
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: triggerauthentication
            spec:
              watch: false
              forProvider:
                manifest:
                  apiVersion: keda.sh/v1alpha1
                  kind: TriggerAuthentication
                  metadata:
                    name: {{`{{ $actorName }}`}}-trigger-auth
                    namespace: {{`{{ $namespace }}`}}
                    labels:
                      {{`{{- range $k, $v := $userLabels }}`}}
                      {{`{{ $k }}`}}: "{{`{{ $v }}`}}"
                      {{`{{- end }}`}}
                      app.kubernetes.io/name: {{`{{ $actorName }}`}}
                      app.kubernetes.io/component: triggerauthentication
                      app.kubernetes.io/part-of: asya
                      app.kubernetes.io/managed-by: crossplane
                  spec:
                    secretTargetRef:
                      - parameter: GoogleApplicationCredentials
                        name: {{ .Values.pubsub.keda.secretRef.name }}
                        key: {{ .Values.pubsub.keda.secretRef.credentialsKey }}
              providerConfigRef:
                name: {{ .Values.kubernetesProviderConfig.name }}
            {{`{{- end }}`}}

    # Create KEDA ScaledObject for autoscaling based on Pub/Sub subscription size
    - step: render-scaledobject
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $xrSpec := $xr.spec -}}`}}
            {{`{{- if and .desired .desired.composite .desired.composite.resource .desired.composite.resource.spec -}}`}}
            {{`{{- $xrSpec = .desired.composite.resource.spec -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $namespace := index $xr.metadata.labels "crossplane.io/claim-namespace" -}}`}}
            {{`{{- $actorName := $xrSpec.actor -}}`}}
            {{`{{- $gcpProject := "`}}{{ .Values.gcpProviderConfig.projectId }}{{`" -}}`}}
            {{`{{- $userLabels := dict -}}`}}
            {{`{{- if and .context (index .context "asya/user-labels") -}}`}}
              {{`{{- $userLabels = index .context "asya/user-labels" -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $subscriptionReady := false -}}`}}
            {{`{{- if .observed.resources -}}`}}
              {{`{{- if index .observed.resources "pubsub-subscription" -}}`}}
                {{`{{- $sub := (index .observed.resources "pubsub-subscription").resource -}}`}}
                {{`{{- if and (hasKey $sub "status") (hasKey $sub.status "conditions") -}}`}}
                  {{`{{- range $sub.status.conditions -}}`}}
                    {{`{{- if and (eq .type "Ready") (eq .status "True") -}}`}}
                      {{`{{- $subscriptionReady = true -}}`}}
                    {{`{{- end -}}`}}
                  {{`{{- end -}}`}}
                {{`{{- end -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $scaling := $xrSpec.scaling -}}`}}
            {{`{{- $workload := $xrSpec.workload -}}`}}
            {{`{{- $scalingEnabled := true -}}`}}
            {{`{{- if and $scaling (hasKey $scaling "enabled") -}}`}}
              {{`{{- $scalingEnabled = $scaling.enabled -}}`}}
            {{`{{- end -}}`}}
            {{`{{- if and $scalingEnabled $subscriptionReady -}}`}}
            {{`{{- $minReplicas := 0 -}}`}}
            {{`{{- $maxReplicas := 10 -}}`}}
            {{`{{- $pollingInterval := 30 -}}`}}
            {{`{{- $cooldownPeriod := 300 -}}`}}
            {{`{{- $queueLength := 5 -}}`}}
            {{`{{- if $scaling -}}`}}
              {{`{{- if hasKey $scaling "minReplicas" }}{{ $minReplicas = $scaling.minReplicas }}{{ end -}}`}}
              {{`{{- if hasKey $scaling "maxReplicas" }}{{ $maxReplicas = $scaling.maxReplicas }}{{ end -}}`}}
              {{`{{- if hasKey $scaling "pollingInterval" }}{{ $pollingInterval = $scaling.pollingInterval }}{{ end -}}`}}
              {{`{{- if hasKey $scaling "cooldownPeriod" }}{{ $cooldownPeriod = $scaling.cooldownPeriod }}{{ end -}}`}}
              {{`{{- if hasKey $scaling "queueLength" }}{{ $queueLength = $scaling.queueLength }}{{ end -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $advanced := dict -}}`}}
            {{`{{- if and $scaling (hasKey $scaling "advanced") -}}`}}
            {{`{{- $advanced = $scaling.advanced -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $workloadName := $actorName -}}`}}
            {{`{{- $workloadKind := "Deployment" -}}`}}
            {{`{{- if hasKey $workload "kind" -}}`}}
              {{`{{- $workloadKind = $workload.kind -}}`}}
            {{`{{- end -}}`}}
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: scaledobject
            spec:
              watch: false
              forProvider:
                manifest:
                  apiVersion: keda.sh/v1alpha1
                  kind: ScaledObject
                  metadata:
                    name: {{`{{ $actorName }}`}}
                    namespace: {{`{{ $namespace }}`}}
                    labels:
                      {{`{{- range $k, $v := $userLabels }}`}}
                      {{`{{ $k }}`}}: "{{`{{ $v }}`}}"
                      {{`{{- end }}`}}
                      app.kubernetes.io/name: {{`{{ $actorName }}`}}
                      app.kubernetes.io/component: scaledobject
                      app.kubernetes.io/part-of: asya
                      app.kubernetes.io/managed-by: crossplane
                  spec:
                    scaleTargetRef:
                      name: {{`{{ $workloadName }}`}}
                      kind: {{`{{ $workloadKind }}`}}
                    minReplicaCount: {{`{{ $minReplicas }}`}}
                    maxReplicaCount: {{`{{ $maxReplicas }}`}}
                    pollingInterval: {{`{{ $pollingInterval }}`}}
                    cooldownPeriod: {{`{{ $cooldownPeriod }}`}}
                    triggers:
                      - type: gcp-pubsub
                        name: queue
                        authenticationRef:
                          name: {{`{{ $actorName }}`}}-trigger-auth
                        metadata:
                          subscriptionName: projects/{{`{{ $gcpProject }}`}}/subscriptions/asya-{{`{{ $namespace }}`}}-{{`{{ $actorName }}`}}
                          mode: SubscriptionSize
                          value: "{{`{{ $queueLength }}`}}"
                    advanced:
                      {{`{{- if and $advanced (hasKey $advanced "restoreToOriginalReplicaCount") }}`}}
                      restoreToOriginalReplicaCount: {{`{{ $advanced.restoreToOriginalReplicaCount }}`}}
                      {{`{{- end }}`}}
                      horizontalPodAutoscalerConfig:
                        behavior:
                          scaleDown:
                            stabilizationWindowSeconds: 300
                            policies:
                              - type: Pods
                                value: 1
                                periodSeconds: 60
                          scaleUp:
                            stabilizationWindowSeconds: 0
                            policies:
                              - type: Pods
                                value: 10
                                periodSeconds: 60
                              - type: Percent
                                value: 100
                                periodSeconds: 60
                      {{`{{- if and $advanced (hasKey $advanced "formula") (hasKey $advanced "target") }}`}}
                      scalingModifiers:
                        formula: {{`{{ $advanced.formula | quote }}`}}
                        target: {{`{{ $advanced.target | quote }}`}}
                        {{`{{- if hasKey $advanced "activationTarget" }}`}}
                        activationTarget: {{`{{ $advanced.activationTarget | quote }}`}}
                        {{`{{- end }}`}}
                        {{`{{- if hasKey $advanced "metricType" }}`}}
                        metricType: {{`{{ $advanced.metricType }}`}}
                        {{`{{- end }}`}}
                      {{`{{- end }}`}}
              providerConfigRef:
                name: {{ .Values.kubernetesProviderConfig.name }}
            {{`{{- end }}`}}

    # Create Deployment from workload template with inline sidecar injection
    - step: render-deployment
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $xrSpec := $xr.spec -}}`}}
            {{`{{- if and .desired .desired.composite .desired.composite.resource .desired.composite.resource.spec -}}`}}
            {{`{{- $xrSpec = .desired.composite.resource.spec -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $namespace := index $xr.metadata.labels "crossplane.io/claim-namespace" -}}`}}
            {{`{{- $actorName := $xrSpec.actor -}}`}}
            {{`{{- $userLabels := dict -}}`}}
            {{`{{- if and .context (index .context "asya/user-labels") -}}`}}
              {{`{{- $userLabels = index .context "asya/user-labels" -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $workload := $xrSpec.workload -}}`}}
            {{`{{- $scaling := $xrSpec.scaling -}}`}}
            {{`{{- $socketDir := "`}}{{ .Values.sidecar.socketDir | default "/var/run/asya" }}{{`" -}}`}}
            {{`{{- $runtimeMountPath := "`}}{{ .Values.sidecar.runtimeMountPath | default "/opt/asya/asya_runtime.py" }}{{`" -}}`}}
            {{`{{- $runtimeConfigMap := "`}}{{ .Values.sidecar.runtimeConfigMap | default "asya-runtime" }}{{`" -}}`}}
            {{`{{- $sidecarImage := "`}}{{ .Values.sidecar.image | default "ghcr.io/deliveryhero/asya-sidecar:latest" }}{{`" -}}`}}
            {{`{{- $sidecarImagePullPolicy := "`}}{{ .Values.sidecar.imagePullPolicy | default "IfNotPresent" }}{{`" -}}`}}
            {{`{{- $gatewayURL := "`}}{{ .Values.sidecar.gatewayURL }}{{`" -}}`}}
            {{`{{- $socketPath := printf "%s/asya-runtime.sock" $socketDir -}}`}}
            {{`{{- $isSystemActor := or (eq $actorName "x-sink") (eq $actorName "x-sump") (eq $actorName "happy-end") (eq $actorName "error-end") -}}`}}
            {{`{{- /* Create Deployment from workload spec */ -}}`}}
            {{`{{- if hasKey $xrSpec "workload" -}}`}}
            {{`{{- $workloadKind := "Deployment" -}}`}}
            {{`{{- if hasKey $workload "kind" -}}`}}
              {{`{{- $workloadKind = $workload.kind -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $scalingEnabled := true -}}`}}
            {{`{{- if and $scaling (hasKey $scaling "enabled") -}}`}}
              {{`{{- $scalingEnabled = $scaling.enabled -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $replicas := 1 -}}`}}
            {{`{{- if not $scalingEnabled -}}`}}
              {{`{{- if hasKey $workload "replicas" -}}`}}
                {{`{{- $replicas = $workload.replicas -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
            spec:
              watch: true
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: {{`{{ $workloadKind }}`}}
                  metadata:
                    name: {{`{{ $actorName }}`}}
                    namespace: {{`{{ $namespace }}`}}
                    labels:
                      {{`{{- range $k, $v := $userLabels }}`}}
                      {{`{{ $k }}`}}: "{{`{{ $v }}`}}"
                      {{`{{- end }}`}}
                      app.kubernetes.io/name: {{`{{ $actorName }}`}}
                      app.kubernetes.io/component: actor
                      app.kubernetes.io/part-of: asya
                      app.kubernetes.io/managed-by: crossplane
                      asya.sh/actor: {{`{{ $actorName }}`}}
                  spec:
                    replicas: {{`{{ $replicas }}`}}
                    selector:
                      matchLabels:
                        app.kubernetes.io/name: {{`{{ $actorName }}`}}
                    template:
                      metadata:
                        labels:
                          {{`{{- range $k, $v := $userLabels }}`}}
                          {{`{{ $k }}`}}: "{{`{{ $v }}`}}"
                          {{`{{- end }}`}}
                          app.kubernetes.io/name: {{`{{ $actorName }}`}}
                          app.kubernetes.io/component: actor
                          asya.sh/actor: {{`{{ $actorName }}`}}
                      spec:
                        terminationGracePeriodSeconds: 30
                        {{`{{- $runtimeContainer := dict -}}`}}
                        {{`{{- if and (hasKey $workload "template") (hasKey $workload.template "spec") (hasKey $workload.template.spec "containers") -}}`}}
                          {{`{{- range $workload.template.spec.containers -}}`}}
                            {{`{{- if eq .name "asya-runtime" -}}`}}
                              {{`{{- $runtimeContainer = . -}}`}}
                            {{`{{- end -}}`}}
                          {{`{{- end -}}`}}
                        {{`{{- end }}`}}
                        containers:
                        - name: asya-runtime
                          image: {{`{{ $runtimeContainer.image | default "missing-image" }}`}}
                          imagePullPolicy: {{`{{ $runtimeContainer.imagePullPolicy | default "IfNotPresent" }}`}}
                          command:
                          - {{`{{ $runtimeContainer.pythonExec | default "python3" }}`}}
                          - {{`{{ $runtimeMountPath }}`}}
                          env:
                          - name: ASYA_SOCKET_DIR
                            value: {{`{{ $socketDir }}`}}
                          {{`{{- if $isSystemActor }}`}}
                          - name: ASYA_ENABLE_VALIDATION
                            value: "false"
                          {{`{{- end }}`}}
                          {{`{{- range $runtimeContainer.env | default list }}`}}
                          - name: {{`{{ .name }}`}}
                            value: {{`{{ .value | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- range $xrSpec.secretRefs | default list }}`}}
                          {{`{{- $secretName := .secretName -}}`}}
                          {{`{{- range .keys | default list }}`}}
                          - name: {{`{{ .envVar }}`}}
                            valueFrom:
                              secretKeyRef:
                                name: {{`{{ $secretName }}`}}
                                key: {{`{{ .key }}`}}
                          {{`{{- end }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.stateProxy }}`}}
                          - name: ASYA_STATE_PROXY_MOUNTS
                            value: "{{`{{- range $i, $sp := $xrSpec.stateProxy -}}{{- if $i }};{{- end -}}{{- $sp.name }}:{{- $sp.mount.path }}:write={{- $sp.writeMode | default "buffered" -}}{{- end }}`}}"
                          {{`{{- end }}`}}
                          volumeMounts:
                          - name: socket-dir
                            mountPath: {{`{{ $socketDir }}`}}
                          - name: tmp
                            mountPath: /tmp
                          - name: asya-runtime
                            mountPath: {{`{{ $runtimeMountPath }}`}}
                            subPath: asya_runtime.py
                            readOnly: true
                          {{`{{- if $xrSpec.stateProxy }}`}}
                          - name: state-sockets
                            mountPath: /var/run/asya/state
                          {{`{{- end }}`}}
                          {{`{{- range $runtimeContainer.volumeMounts | default list }}`}}
                          - name: {{`{{ .name }}`}}
                            mountPath: {{`{{ .mountPath }}`}}
                            {{`{{- if .subPath }}`}}
                            subPath: {{`{{ .subPath }}`}}
                            {{`{{- end }}`}}
                            {{`{{- if .readOnly }}`}}
                            readOnly: {{`{{ .readOnly }}`}}
                            {{`{{- end }}`}}
                          {{`{{- end }}`}}
                          {{`{{- with $runtimeContainer.resources }}`}}
                          resources:
                            {{`{{- . | toYaml | nindent 16 }}`}}
                          {{`{{- end }}`}}
                          startupProbe:
                            exec:
                              command: ["sh", "-c", "test -S {{`{{ $socketPath }}`}} && test -f {{`{{ $socketDir }}`}}/runtime-ready"]
                            initialDelaySeconds: 3
                            periodSeconds: 2
                            timeoutSeconds: 3
                            failureThreshold: 150
                          livenessProbe:
                            exec:
                              command: ["sh", "-c", "test -S {{`{{ $socketPath }}`}} && test -f {{`{{ $socketDir }}`}}/runtime-ready"]
                            periodSeconds: 30
                            timeoutSeconds: 5
                            failureThreshold: 3
                          readinessProbe:
                            exec:
                              command: ["sh", "-c", "test -S {{`{{ $socketPath }}`}} && test -f {{`{{ $socketDir }}`}}/runtime-ready"]
                            periodSeconds: 10
                            timeoutSeconds: 3
                            failureThreshold: 3
                        {{`{{- range $workload.template.spec.containers }}`}}
                        {{`{{- if ne .name "asya-runtime" }}`}}
                        - {{`{{ . | toYaml | nindent 26 }}`}}
                        {{`{{- end }}`}}
                        {{`{{- end }}`}}
                        - name: asya-sidecar
                          image: {{`{{ $sidecarImage }}`}}
                          imagePullPolicy: {{`{{ $sidecarImagePullPolicy }}`}}
                          env:
                          - name: ASYA_LOG_LEVEL
                            value: "info"
                          - name: ASYA_SOCKET_DIR
                            value: {{`{{ $socketDir }}`}}
                          - name: ASYA_ACTOR_NAME
                            value: {{`{{ $actorName }}`}}
                          - name: ASYA_NAMESPACE
                            value: {{`{{ $namespace }}`}}
                          - name: ASYA_ACTOR_SINK
                            value: x-sink
                          - name: ASYA_ACTOR_SUMP
                            value: x-sump
                          - name: ASYA_ACTOR_HAPPY_END
                            value: happy-end
                          - name: ASYA_ACTOR_ERROR_END
                            value: error-end
                          - name: ASYA_TRANSPORT
                            value: pubsub
                          {{- if .Values.sidecar.gcpProjectId }}
                          - name: ASYA_PUBSUB_PROJECT_ID
                            value: {{ .Values.sidecar.gcpProjectId | quote }}
                          {{- end }}
                          {{- if .Values.sidecar.pubsubEndpoint }}
                          - name: ASYA_PUBSUB_ENDPOINT
                            value: {{ .Values.sidecar.pubsubEndpoint | quote }}
                          {{- end }}
                          {{`{{- if ne $gatewayURL "" }}`}}
                          - name: ASYA_GATEWAY_URL
                            value: {{`{{ $gatewayURL }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $isSystemActor }}`}}
                          - name: ASYA_IS_END_ACTOR
                            value: "true"
                          {{`{{- end }}`}}
                          {{`{{- range (($xrSpec.sidecar | default dict).env | default list) }}`}}
                          - name: {{`{{ .name }}`}}
                            value: {{`{{ .value | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency }}`}}
                          {{`{{- if $xrSpec.resiliency.retry }}`}}
                          {{`{{- if $xrSpec.resiliency.retry.policy }}`}}
                          - name: ASYA_RESILIENCY_RETRY_POLICY
                            value: {{`{{ $xrSpec.resiliency.retry.policy | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.retry.maxAttempts }}`}}
                          - name: ASYA_RESILIENCY_RETRY_MAX_ATTEMPTS
                            value: {{`{{ $xrSpec.resiliency.retry.maxAttempts | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.retry.initialInterval }}`}}
                          - name: ASYA_RESILIENCY_RETRY_INITIAL_INTERVAL
                            value: {{`{{ $xrSpec.resiliency.retry.initialInterval | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.retry.maxInterval }}`}}
                          - name: ASYA_RESILIENCY_RETRY_MAX_INTERVAL
                            value: {{`{{ $xrSpec.resiliency.retry.maxInterval | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.retry.backoffCoefficient }}`}}
                          - name: ASYA_RESILIENCY_RETRY_BACKOFF_COEFFICIENT
                            value: {{`{{ $xrSpec.resiliency.retry.backoffCoefficient | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.retry.jitter }}`}}
                          - name: ASYA_RESILIENCY_RETRY_JITTER
                            value: {{`{{ $xrSpec.resiliency.retry.jitter | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.nonRetryableErrors }}`}}
                          - name: ASYA_RESILIENCY_NON_RETRYABLE_ERRORS
                            value: {{`{{ $xrSpec.resiliency.nonRetryableErrors | join "," | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- if $xrSpec.resiliency.actorTimeout }}`}}
                          - name: ASYA_RESILIENCY_ACTOR_TIMEOUT
                            value: {{`{{ $xrSpec.resiliency.actorTimeout | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- end }}`}}
                          {{- if .Values.sidecar.gcpCredsSecret }}
                          envFrom:
                          - secretRef:
                              name: {{ .Values.sidecar.gcpCredsSecret | quote }}
                          {{- end }}
                          volumeMounts:
                          - name: socket-dir
                            mountPath: {{`{{ $socketDir }}`}}
                          - name: tmp
                            mountPath: /tmp
                        {{`{{- range $xrSpec.stateProxy | default list }}`}}
                        - name: asya-state-proxy-{{`{{ .name }}`}}
                          image: {{`{{ .connector.image }}`}}
                          env:
                          - name: CONNECTOR_SOCKET
                            value: /var/run/asya/state/{{`{{ .name }}`}}.sock
                          {{`{{- range .connector.env | default list }}`}}
                          - name: {{`{{ .name }}`}}
                            value: {{`{{ .value | quote }}`}}
                          {{`{{- end }}`}}
                          {{`{{- with .connector.resources }}`}}
                          resources:
                            {{`{{- . | toYaml | nindent 16 }}`}}
                          {{`{{- end }}`}}
                          volumeMounts:
                          - name: state-sockets
                            mountPath: /var/run/asya/state
                        {{`{{- end }}`}}
                        volumes:
                        - name: socket-dir
                          emptyDir: {}
                        - name: tmp
                          emptyDir: {}
                        - name: asya-runtime
                          configMap:
                            name: {{`{{ $runtimeConfigMap }}`}}
                            defaultMode: 0755
                        {{`{{- if $xrSpec.stateProxy }}`}}
                        - name: state-sockets
                          emptyDir: {}
                        {{`{{- end }}`}}
                        {{`{{- if and (hasKey $workload "template") (hasKey $workload.template "spec") }}`}}
                        {{`{{- range $workload.template.spec.volumes | default list }}`}}
                        - {{`{{ . | toYaml | nindent 14 }}`}}
                        {{`{{- end }}`}}
                        {{`{{- with $workload.template.spec.nodeSelector }}`}}
                        nodeSelector:
                          {{`{{- . | toYaml | nindent 14 }}`}}
                        {{`{{- end }}`}}
                        {{`{{- with $workload.template.spec.affinity }}`}}
                        affinity:
                          {{`{{- . | toYaml | nindent 14 }}`}}
                        {{`{{- end }}`}}
                        {{`{{- with $workload.template.spec.tolerations }}`}}
                        tolerations:
                          {{`{{- . | toYaml | nindent 14 }}`}}
                        {{`{{- end }}`}}
                        {{`{{- end }}`}}
              providerConfigRef:
                name: {{ .Values.kubernetesProviderConfig.name }}
            {{`{{- end }}`}}

    # Patch status and derive phase
    - step: patch-status-and-derive-phase
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{`{{- $xr := .observed.composite.resource -}}`}}
            {{`{{- $actorName := $xr.spec.actor -}}`}}
            {{`{{- $namespace := index $xr.metadata.labels "crossplane.io/claim-namespace" -}}`}}
            {{`{{- $queueIdentifier := printf "asya-%s-%s" $namespace $actorName -}}`}}
            {{`{{- $topicReady := false -}}`}}
            {{`{{- $subscriptionReady := false -}}`}}
            {{`{{- $kedaReady := false -}}`}}
            {{`{{- $scalingEnabled := true -}}`}}
            {{`{{- if hasKey $xr.spec "scaling" -}}`}}
              {{`{{- if hasKey $xr.spec.scaling "enabled" -}}`}}
                {{`{{- $scalingEnabled = $xr.spec.scaling.enabled -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            {{`{{- if not $scalingEnabled -}}`}}
              {{`{{- $kedaReady = true -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $workloadReplicas := 0 -}}`}}
            {{`{{- $workloadReadyReplicas := 0 -}}`}}
            {{`{{- if .observed.resources -}}`}}
              {{`{{- if index .observed.resources "pubsub-topic" -}}`}}
                {{`{{- $t := (index .observed.resources "pubsub-topic").resource -}}`}}
                {{`{{- if and (hasKey $t "status") (hasKey $t.status "conditions") -}}`}}
                  {{`{{- range $t.status.conditions -}}`}}
                    {{`{{- if and (eq .type "Ready") (eq .status "True") -}}`}}
                      {{`{{- $topicReady = true -}}`}}
                    {{`{{- end -}}`}}
                  {{`{{- end -}}`}}
                {{`{{- end -}}`}}
              {{`{{- end -}}`}}
              {{`{{- if index .observed.resources "pubsub-subscription" -}}`}}
                {{`{{- $sub := (index .observed.resources "pubsub-subscription").resource -}}`}}
                {{`{{- if and (hasKey $sub "status") (hasKey $sub.status "conditions") -}}`}}
                  {{`{{- range $sub.status.conditions -}}`}}
                    {{`{{- if and (eq .type "Ready") (eq .status "True") -}}`}}
                      {{`{{- $subscriptionReady = true -}}`}}
                    {{`{{- end -}}`}}
                  {{`{{- end -}}`}}
                {{`{{- end -}}`}}
              {{`{{- end -}}`}}
              {{`{{- if index .observed.resources "scaledobject" -}}`}}
                {{`{{- $so := (index .observed.resources "scaledobject").resource -}}`}}
                {{`{{- if and (hasKey $so "status") (hasKey $so.status "atProvider") (hasKey $so.status.atProvider "manifest") (hasKey $so.status.atProvider.manifest "status") -}}`}}
                  {{`{{- range $so.status.atProvider.manifest.status.conditions | default list -}}`}}
                    {{`{{- if and (eq .type "Ready") (eq .status "True") -}}`}}
                      {{`{{- $kedaReady = true -}}`}}
                    {{`{{- end -}}`}}
                  {{`{{- end -}}`}}
                {{`{{- end -}}`}}
              {{`{{- end -}}`}}
              {{`{{- if index .observed.resources "deployment" -}}`}}
                {{`{{- $dep := (index .observed.resources "deployment").resource -}}`}}
                {{`{{- if and (hasKey $dep "status") (hasKey $dep.status "atProvider") (hasKey $dep.status.atProvider "manifest") (hasKey $dep.status.atProvider.manifest "status") -}}`}}
                  {{`{{- $workloadReplicas = $dep.status.atProvider.manifest.status.replicas | default 0 -}}`}}
                  {{`{{- $workloadReadyReplicas = $dep.status.atProvider.manifest.status.readyReplicas | default 0 -}}`}}
                {{`{{- end -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $workloadReady := false -}}`}}
            {{`{{- if and .observed.resources (index .observed.resources "deployment") -}}`}}
              {{`{{- $dep := (index .observed.resources "deployment").resource -}}`}}
              {{`{{- if and (hasKey $dep "status") (hasKey $dep.status "atProvider") (hasKey $dep.status.atProvider "manifest") (hasKey $dep.status.atProvider.manifest "status") -}}`}}
                {{`{{- range $dep.status.atProvider.manifest.status.conditions | default list -}}`}}
                  {{`{{- if and (eq .type "Available") (eq .status "True") -}}`}}
                    {{`{{- $workloadReady = true -}}`}}
                  {{`{{- end -}}`}}
                {{`{{- end -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            {{`{{- $queueReady := and $topicReady $subscriptionReady -}}`}}
            {{`{{- $phase := "Creating" -}}`}}
            {{`{{- if and $queueReady $kedaReady $workloadReady -}}`}}
              {{`{{- $phase = "Ready" -}}`}}
              {{`{{- if eq (int $workloadReplicas) 0 -}}`}}
                {{`{{- $phase = "Napping" -}}`}}
              {{`{{- end -}}`}}
            {{`{{- end -}}`}}
            apiVersion: asya.sh/v1alpha1
            kind: XAsyncActor
            metadata:
              labels:
                asya.sh/actor: {{`{{ $actorName }}`}}
            status:
              phase: {{`{{ $phase }}`}}
              queueIdentifier: {{`{{ $queueIdentifier }}`}}
              infrastructure:
                queue:
                  ready: {{`{{ $queueReady }}`}}
                keda:
                  ready: {{`{{ $kedaReady }}`}}
                workload:
                  ready: {{`{{ $workloadReady }}`}}
                  replicas: {{`{{ $workloadReplicas }}`}}
                  readyReplicas: {{`{{ $workloadReadyReplicas }}`}}

    # Automatically detect readiness from all composed resources
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
{{- end }}
