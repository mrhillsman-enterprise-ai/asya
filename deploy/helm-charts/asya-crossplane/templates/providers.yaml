---
{{- if .Values.providers.aws.enabled }}
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-sqs
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/upbound/provider-aws-sqs:{{ .Values.providers.aws.sqsVersion }}
{{- end }}
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes-watches
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-kubernetes
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              args:
                - --enable-watches
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:{{ .Values.providers.kubernetes.version }}
  runtimeConfigRef:
    name: provider-kubernetes-watches
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-go-templating
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-go-templating:{{ .Values.functions.goTemplatingVersion }}
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:{{ .Values.functions.patchAndTransformVersion }}
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-auto-ready
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-auto-ready:{{ .Values.functions.autoReadyVersion }}
{{- if .Values.functions.flavorsEnabled }}
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-asya-flavors
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: ghcr.io/deliveryhero/function-asya-flavors:{{ .Values.functions.flavorsVersion }}
  packagePullPolicy: {{ .Values.functions.flavorsPackagePullPolicy | default "IfNotPresent" }}
{{- end }}
