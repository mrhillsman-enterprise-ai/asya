---
{{- if .Values.providers.aws.enabled }}
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-sqs
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/upbound/provider-aws-sqs:{{ .Values.providers.aws.sqsVersion }}
{{- end }}
---
{{- if .Values.providers.gcp.enabled }}
{{- if .Values.gcpProviderConfig.emulatorHost }}
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: gcp-emulator-config
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
          - name: package-runtime
            env:
            - name: PUBSUB_EMULATOR_HOST
              value: {{ .Values.gcpProviderConfig.emulatorHost | quote }}
---
{{- end }}
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-gcp-pubsub
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/upbound/provider-gcp-pubsub:{{ .Values.providers.gcp.pubsubVersion }}
  {{- if .Values.gcpProviderConfig.emulatorHost }}
  runtimeConfigRef:
    name: gcp-emulator-config
  {{- end }}
{{- end }}
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes-watches
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-kubernetes
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              args:
                - --enable-watches
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:{{ .Values.providers.kubernetes.version }}
  runtimeConfigRef:
    name: provider-kubernetes-watches
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-go-templating
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-go-templating:{{ .Values.functions.goTemplatingVersion }}
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:{{ .Values.functions.patchAndTransformVersion }}
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-auto-ready
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-auto-ready:{{ .Values.functions.autoReadyVersion }}
---
{{- if .Values.functions.overlaysEnabled }}
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-asya-overlays
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  package: {{ .Values.functions.overlaysRepository }}:{{ .Values.functions.overlaysVersion }}
  packagePullPolicy: {{ .Values.functions.overlaysPackagePullPolicy }}
{{- end }}
