apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xasyncactors.asya.sh
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  group: asya.sh
  names:
    kind: XAsyncActor
    plural: xasyncactors
  claimNames:
    kind: AsyncActor
    plural: asyncactors
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - transport
              x-kubernetes-validations:
                - rule: "!has(self.workload) || !has(self.workloadRef)"
                  message: "workload and workloadRef are mutually exclusive"
              properties:
                transport:
                  type: string
                  description: Transport type for message queue
                  enum:
                    - sqs
                    - rabbitmq
                  default: sqs

                actorName:
                  type: string
                  description: Actor name used for queue naming and routing (defaults to metadata.name)

                region:
                  type: string
                  description: AWS region for SQS queue
                  default: us-east-1

                scaling:
                  type: object
                  description: KEDA autoscaling configuration
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    minReplicas:
                      type: integer
                      default: 0
                    maxReplicas:
                      type: integer
                      default: 10
                    pollingInterval:
                      type: integer
                      description: Interval in seconds to poll for messages
                      default: 30
                    cooldownPeriod:
                      type: integer
                      description: Seconds to wait before scaling down
                      default: 300
                    queueLength:
                      type: integer
                      description: Target queue length per replica
                      default: 5

                workload:
                  type: object
                  description: |
                    Workload template (Crossplane manages the Deployment).
                    Must contain exactly one container named 'asya-runtime' without 'command' defined.
                  x-kubernetes-preserve-unknown-fields: true
                  x-kubernetes-validations:
                    # Must have template.spec.containers
                    - rule: "has(self.template) && has(self.template.spec) && has(self.template.spec.containers)"
                      message: "workload must have template.spec.containers"
                    # Exactly one container named 'asya-runtime'
                    - rule: "self.template.spec.containers.filter(c, c.name == 'asya-runtime').size() == 1"
                      message: "workload must have exactly one container named 'asya-runtime'"
                    # asya-runtime must NOT have 'command' (injected by operator)
                    - rule: "self.template.spec.containers.filter(c, c.name == 'asya-runtime').all(c, !has(c.command) || c.command.size() == 0)"
                      message: "asya-runtime container must not define 'command' (injected by operator)"
                    # TODO: More validations planned
                    # - No container named 'asya-sidecar' (reserved)
                    # - Must have ASYA_HANDLER env var
                    # - No forbidden env vars (ASYA_SOCKET_DIR, etc.)
                    # - No forbidden mounts (/opt/asya/*)
                  properties:
                    kind:
                      type: string
                      enum:
                        - Deployment
                        - StatefulSet
                      default: Deployment

                workloadRef:
                  type: object
                  description: Reference to existing workload (user manages the Deployment)
                  properties:
                    name:
                      type: string
                    kind:
                      type: string
                      enum:
                        - Deployment
                        - StatefulSet
                      default: Deployment

                sidecar:
                  type: object
                  description: Sidecar configuration overrides
                  properties:
                    image:
                      type: string
                      default: ghcr.io/deliveryhero/asya-sidecar:latest
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true

                providerConfigRef:
                  type: string
                  description: Name of the AWS ProviderConfig to use
                  default: default

                irsa:
                  type: object
                  description: IRSA (IAM Roles for Service Accounts) configuration
                  properties:
                    enabled:
                      type: boolean
                      description: Enable ServiceAccount with IRSA annotation
                      default: true
                    roleArn:
                      type: string
                      description: IAM role ARN for the ServiceAccount (overrides default pattern)

            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Current phase of the AsyncActor
                queueUrl:
                  type: string
                  description: URL of the SQS queue
                queueArn:
                  type: string
                  description: ARN of the SQS queue
                infrastructure:
                  type: object
                  description: Status of infrastructure components
                  properties:
                    queue:
                      type: object
                      properties:
                        ready:
                          type: boolean
                        message:
                          type: string
                    keda:
                      type: object
                      properties:
                        ready:
                          type: boolean
                        message:
                          type: string
                    workload:
                      type: object
                      properties:
                        ready:
                          type: boolean
                        replicas:
                          type: integer
                        readyReplicas:
                          type: integer
      additionalPrinterColumns:
        - name: Transport
          type: string
          jsonPath: .spec.transport
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Queue
          type: string
          jsonPath: .status.queueUrl
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
