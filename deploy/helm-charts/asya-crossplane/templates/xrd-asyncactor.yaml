apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xasyncactors.asya.sh
  labels:
    {{- include "asya-crossplane.labels" . | nindent 4 }}
spec:
  group: asya.sh
  names:
    kind: XAsyncActor
    plural: xasyncactors
    shortNames:
      - xasya
      - xasyas
  claimNames:
    kind: AsyncActor
    plural: asyncactors
    shortNames:
      - asya
      - asyas
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - actor
                - transport
                - image
                - handler
              properties:
                actor:
                  type: string
                  description: Logical actor identity used for queue naming and message routing
                  minLength: 1
                  maxLength: 63
                  pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'

                transport:
                  type: string
                  description: Transport type for message queue
                  enum:
                    - sqs
                    - rabbitmq
                    - pubsub
                  default: sqs

                flavors:
                  type: array
                  maxItems: 8
                  items:
                    type: string
                    minLength: 3
                  description: >-
                    List of flavor names (EnvironmentConfigs) to compose.
                    Applied left-to-right; later flavors override earlier ones.
                    Actor inline spec is applied last and always wins.

                image:
                  type: string
                  description: Container image for the asya-runtime container
                  minLength: 1

                imagePullPolicy:
                  type: string
                  description: Image pull policy for the asya-runtime container
                  enum:
                    - Always
                    - IfNotPresent
                    - Never
                  default: IfNotPresent

                handler:
                  type: string
                  description: >-
                    Python handler path (module.function or module.Class.method).
                    Injected as ASYA_HANDLER env var into the runtime container.
                  minLength: 1

                pythonExecutable:
                  type: string
                  description: >-
                    Python executable used to launch the runtime container.
                    Override when the container image does not have 'python3' on PATH
                    (e.g. '/usr/bin/python', 'python3.12').
                  default: python3
                  minLength: 1

                replicas:
                  type: integer
                  description: Number of replicas (only used when scaling is disabled)
                  minimum: 1
                  default: 1

                env:
                  type: array
                  description: Additional environment variables for the asya-runtime container
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true

                resources:
                  type: object
                  description: Resource requests and limits for the asya-runtime container
                  x-kubernetes-preserve-unknown-fields: true

                tolerations:
                  type: array
                  description: Tolerations for the actor pod
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

                nodeSelector:
                  type: object
                  description: Node selector for the actor pod
                  x-kubernetes-preserve-unknown-fields: true

                volumes:
                  type: array
                  description: Additional volumes to attach to the actor pod
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

                volumeMounts:
                  type: array
                  description: Additional volume mounts for the asya-runtime container
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

                scaling:
                  type: object
                  description: KEDA autoscaling configuration
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    minReplicaCount:
                      type: integer
                      default: 0
                    maxReplicaCount:
                      type: integer
                      default: 10
                    pollingInterval:
                      type: integer
                      description: Interval in seconds to poll for messages
                      default: 30
                    cooldownPeriod:
                      type: integer
                      description: Seconds to wait before scaling down
                      default: 300
                    queueLength:
                      type: integer
                      description: Target queue length per replica
                      default: 5
                    advanced:
                      type: object
                      description: Advanced KEDA ScaledObject configuration
                      properties:
                        restoreToOriginalReplicaCount:
                          type: boolean
                          description: Restore to original replica count when ScaledObject is deleted
                        formula:
                          type: string
                          description: >-
                            Composite metric formula for KEDA scalingModifiers.
                            Enables custom scaling expressions combining multiple metrics.
                            Requires target to be set.
                        target:
                          type: string
                          description: Target value for the composite metric formula (used with formula)
                        activationTarget:
                          type: string
                          description: Activation threshold for the composite metric formula (used with formula)
                        metricType:
                          type: string
                          description: Metric type for scalingModifiers composite metric
                          enum:
                            - AverageValue
                            - Value
                            - Utilization
                      oneOf:
                        - not:
                            required:
                              - formula
                        - required:
                            - formula
                            - target
                    additionalTriggers:
                      type: array
                      description: >-
                        Extra KEDA trigger objects appended after the auto-generated
                        primary queue trigger. The composition always owns the primary
                        queue trigger; supply only additional triggers here.
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true

                resiliency:
                  type: object
                  description: Resiliency configuration for automatic retry and error handling
                  properties:
                    retry:
                      type: object
                      description: Retry policy configuration
                      properties:
                        policy:
                          type: string
                          description: Retry backoff policy
                          enum:
                            - constant
                            - exponential
                          default: exponential
                        maxAttempts:
                          type: integer
                          description: Maximum retry attempts (0 disables retry)
                          minimum: 0
                          default: 3
                        initialInterval:
                          type: string
                          description: Initial retry delay (e.g. "1s", "500ms")
                          default: 1s
                        maxInterval:
                          type: string
                          description: Maximum retry delay cap (e.g. "300s", "5m")
                          default: 300s
                        backoffCoefficient:
                          type: number
                          description: Multiplier for exponential backoff (must be >= 1.0)
                          minimum: 1.0
                          default: 2.0
                        jitter:
                          type: boolean
                          description: Add randomness to prevent thundering herd
                          default: true
                    nonRetryableErrors:
                      type: array
                      description: Error types that skip retry (supports MRO matching)
                      items:
                        type: string
                    actorTimeout:
                      type: string
                      description: Per-actor processing timeout (e.g. "30s", "5m")

                sidecar:
                  type: object
                  description: Sidecar configuration overrides
                  properties:
                    image:
                      type: string
                      default: ghcr.io/deliveryhero/asya-sidecar:latest
                    imagePullPolicy:
                      type: string
                      description: Image pull policy for the sidecar container
                      enum:
                        - Always
                        - IfNotPresent
                        - Never
                    env:
                      type: array
                      description: Additional environment variables for the sidecar container
                      items:
                        type: object
                        required:
                          - name
                          - value
                        properties:
                          name:
                            type: string
                          value:
                            type: string
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true

                stateProxy:
                  type: array
                  description: State proxy mount configurations for persistent state access
                  items:
                    type: object
                    required:
                      - name
                      - mount
                      - connector
                    properties:
                      name:
                        type: string
                        description: Unique mount identifier (DNS label format)
                        minLength: 1
                        maxLength: 63
                        pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
                      mount:
                        type: object
                        required:
                          - path
                        properties:
                          path:
                            type: string
                            description: Absolute path inside runtime container
                            pattern: '^/'
                      writeMode:
                        type: string
                        description: Write buffering mode for the state proxy
                        enum:
                          - buffered
                          - passthrough
                        default: buffered
                      connector:
                        type: object
                        required:
                          - image
                        properties:
                          image:
                            type: string
                            description: Container image for the state proxy connector
                            minLength: 1
                          env:
                            type: array
                            description: Backend-specific environment variables
                            items:
                              type: object
                              required:
                                - name
                                - value
                              properties:
                                name:
                                  type: string
                                value:
                                  type: string
                          resources:
                            type: object
                            description: Kubernetes resource requests/limits
                            x-kubernetes-preserve-unknown-fields: true

                secretRefs:
                  type: array
                  description: Secret references to inject as env vars into the actor runtime container
                  items:
                    type: object
                    required:
                      - secretName
                      - keys
                    properties:
                      secretName:
                        type: string
                        description: Name of the Kubernetes Secret in the same namespace
                        minLength: 1
                      keys:
                        type: array
                        minItems: 1
                        items:
                          type: object
                          required:
                            - key
                            - envVar
                          properties:
                            key:
                              type: string
                              description: Key within the Secret
                              minLength: 1
                            envVar:
                              type: string
                              description: Environment variable name to inject into the runtime container
                              minLength: 1

            status:
              type: object
              properties:
                phase:
                  type: string
                  description: |
                    Current phase of the AsyncActor.
                    Values: Creating, Ready, Napping
                queueUrl:
                  type: string
                  description: Connection URL for the queue
                queueIdentifier:
                  type: string
                  description: Unique identifier for the queue resource
                infrastructure:
                  type: object
                  description: Status of infrastructure components
                  properties:
                    queue:
                      type: object
                      description: Queue status
                      properties:
                        ready:
                          type: boolean
                          description: Whether the queue is ready
                        message:
                          type: string
                    keda:
                      type: object
                      description: KEDA ScaledObject status
                      properties:
                        ready:
                          type: boolean
                          description: Whether the ScaledObject is ready
                        message:
                          type: string
                    workload:
                      type: object
                      description: Deployment status
                      properties:
                        ready:
                          type: boolean
                          description: Whether the workload is ready
                        replicas:
                          type: integer
                          description: Total desired replicas
                        readyReplicas:
                          type: integer
                          description: Number of ready replicas
      additionalPrinterColumns:
        - name: Actor
          type: string
          jsonPath: .spec.actor
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.infrastructure.workload.readyReplicas
        - name: Replicas
          type: integer
          jsonPath: .status.infrastructure.workload.replicas
        - name: Transport
          type: string
          jsonPath: .spec.transport
        - name: Queue
          type: string
          jsonPath: .status.queueUrl
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
