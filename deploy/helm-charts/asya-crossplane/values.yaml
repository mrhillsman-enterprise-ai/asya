# ProviderConfig installation (set to false for first install before CRDs exist)
providerConfigs:
  install: true

# Crossplane provider configuration
providers:
  aws:
    # Enable AWS SQS provider (set to false for RabbitMQ-only deployments)
    enabled: true
    # SQS provider version
    sqsVersion: "v1.19.0"
  kubernetes:
    # Kubernetes provider version
    version: "v0.17.0"

# Crossplane functions
functions:
  goTemplatingVersion: "v0.11.3"
  patchAndTransformVersion: "v0.8.2"
  autoReadyVersion: "v0.6.0"
  overlaysEnabled: false
  overlaysVersion: "latest"
  overlaysPackagePullPolicy: IfNotPresent

# AWS ProviderConfig settings
awsProviderConfig:
  # Name of the ProviderConfig
  name: default
  # Credentials source: Secret, InjectedIdentity, or Upbound
  credentialsSource: Secret
  # Secret reference for credentials (when source is Secret)
  secretRef:
    namespace: crossplane-system
    name: aws-creds
    key: credentials
  # Custom endpoint configuration (for LocalStack or other AWS-compatible services)
  endpoint:
    enabled: false
    url: ""
    # Set to true for LocalStack
    hostnameImmutable: true
  # Skip validation flags (useful for LocalStack)
  skipCredentialsValidation: false
  skipMetadataApiCheck: false
  skipRequestingAccountId: false
  skipRegionValidation: false
  s3UsePathStyle: false

# Kubernetes ProviderConfig settings
kubernetesProviderConfig:
  name: in-cluster
  credentialsSource: InjectedIdentity

# Default region for AWS resources
awsRegion: us-east-1

# AWS account ID (required for KEDA SQS trigger queue URL)
awsAccountId: "000000000000"

# Namespace where AsyncActors will be created
actorNamespace: asya-e2e

# IRSA (IAM Roles for Service Accounts) configuration
irsa:
  # Enable ServiceAccount creation with IRSA annotation
  enabled: true
  # ServiceAccount name (shared per namespace)
  serviceAccountName: asya-actors
  # IAM role ARN pattern - {namespace} will be replaced with actual namespace
  # For production, set this to your actual IAM role ARN pattern
  roleArnPattern: "arn:aws:iam::ACCOUNT_ID:role/asya-actors-{namespace}"

# Runtime ConfigMap provisioning
runtime:
  # Create asya-runtime ConfigMap in actor namespace
  enabled: true

# KEDA authentication configuration (SQS)
keda:
  # TriggerAuthentication provider type: "podIdentity" or "secret"
  authProvider: podIdentity
  # For secret-based auth, specify the secret reference
  secretRef:
    name: ""
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY

# RabbitMQ configuration (used by composition-rabbitmq)
rabbitmq:
  host: "rabbitmq.default.svc.cluster.local"
  port: 5672
  keda:
    secretRef:
      name: "rabbitmq-keda-secret"
      hostKey: "host"
