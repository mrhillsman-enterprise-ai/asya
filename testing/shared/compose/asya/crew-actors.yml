x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "2"

# Note: Volumes must be defined in the compose file that includes this file

services:
  # x-sink actor (success handler)
  asya-x-sink-runtime:
    build:
      context: ../../../../src/asya-crew
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
    depends_on:
      storage-setup:
        condition: service_completed_successfully
    env_file:
    - ../envs/.env.asya-shared
    - ../envs/.env.asya-runtime
    - ../envs/.env.${ASYA_TRANSPORT}
    - ../envs/.env.${ASYA_STORAGE}
    environment:
    - ASYA_HANDLER=asya_crew.sink.sink_handler
    - ASYA_PERSISTENCE_MOUNT=/tmp/checkpoints/results
    volumes:
    - asya-x-sink-sockets:/var/run/asya
    - asya-checkpoints-results:/tmp/checkpoints/results
    - ../../../../src/asya-runtime/asya_runtime.py:/opt/asya/asya_runtime.py:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 2s
      timeout: 1s
      retries: 15

  asya-x-sink-sidecar:
    network_mode: "service:asya-x-sink-runtime"
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
    logging: *default-logging
    depends_on:
      asya-x-sink-runtime:
        condition: service_healthy
      gateway:
        condition: service_healthy
      queue-setup:
        condition: service_completed_successfully
    env_file:
    - ../envs/.env.asya-sidecar
    - ../envs/.env.${ASYA_TRANSPORT}
    environment:
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 5s
      ASYA_IS_END_ACTOR: "true"
      ASYA_ACTOR_NAME: x-sink
      ASYA_GATEWAY_URL: http://gateway:8080
    volumes:
    - asya-x-sink-sockets:/var/run/asya

  # x-sump actor (failure handler)
  asya-x-sump-runtime:
    build:
      context: ../../../../src/asya-crew
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
    depends_on:
      storage-setup:
        condition: service_completed_successfully
    env_file:
    - ../envs/.env.asya-shared
    - ../envs/.env.asya-runtime
    - ../envs/.env.${ASYA_TRANSPORT}
    - ../envs/.env.${ASYA_STORAGE}
    environment:
    - ASYA_HANDLER=asya_crew.sump.sump_handler
    - ASYA_PERSISTENCE_MOUNT=/tmp/checkpoints/errors
    volumes:
    - asya-x-sump-sockets:/var/run/asya
    - ../../../../src/asya-runtime/asya_runtime.py:/opt/asya/asya_runtime.py:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 2s
      timeout: 1s
      retries: 15

  asya-x-sump-sidecar:
    network_mode: "service:asya-x-sump-runtime"
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
    logging: *default-logging
    depends_on:
      asya-x-sump-runtime:
        condition: service_healthy
      gateway:
        condition: service_healthy
      queue-setup:
        condition: service_completed_successfully
    env_file:
    - ../envs/.env.asya-sidecar
    - ../envs/.env.${ASYA_TRANSPORT}
    environment:
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 5s
      ASYA_IS_END_ACTOR: "true"
      ASYA_ACTOR_NAME: x-sump
      ASYA_GATEWAY_URL: http://gateway:8080
    volumes:
    - asya-x-sump-sockets:/var/run/asya

  # Waiter service for system actors dependency subgraph
  crew-actors-waiter:
    image: busybox:latest
    command: ["sh", "-c", "echo 'System actors ready'"]
    depends_on:
      asya-x-sink-sidecar:
        condition: service_started
      asya-x-sump-sidecar:
        condition: service_started

volumes:
  # Shared with gateway so GetTask can serve history from persisted envelopes.
  asya-checkpoints-results:
