x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "2"

services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    logging: *default-logging
    command: ["-scheme", "http", "-port", "4443"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 2s
      timeout: 5s
      retries: 10

  storage-setup:
    image: curlimages/curl:latest
    logging: *default-logging
    profiles: [""]
    depends_on:
      fake-gcs:
        condition: service_healthy
    volumes:
    - ./configs/gcs-buckets.txt:/tmp/gcs-buckets.txt:ro
    entrypoint:
    - /bin/sh
    - -c
    - |
      while IFS= read -r bucket || [ -n "$$bucket" ]; do
        [ -z "$$bucket" ] && continue
        case "$$bucket" in '#'*) continue;; esac
        curl -sf -X POST \
          "http://fake-gcs:4443/storage/v1/b?project=test" \
          -H 'Content-Type: application/json' \
          -d "{\"name\": \"$$bucket\"}" || true
      done < /tmp/gcs-buckets.txt
      echo '[+] GCS buckets created successfully'
