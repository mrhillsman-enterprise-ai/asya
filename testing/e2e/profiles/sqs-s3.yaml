# Test profile (values.yaml file): SQS + S3
#
# Tests SQS message transport with S3 object storage
# (using LocalStack for both SQS and S3 emulation in E2E environment)

namespace: asya-e2e

transport:
  rabbitmq:
    enabled: false
  sqs:
    enabled: true

storage:
  minio:
    enabled: false
  s3:
    enabled: true

actors:
  namespace: asya-e2e
  transport: sqs
  storage:
    type: s3
    endpoint: http://localstack-s3.asya-system.svc.cluster.local:4566
    bucket: asya-results
    resultsBucket: asya-results
    errorsBucket: asya-errors
    region: us-east-1
    accessKey: test
    secretKey: test

crew:
  image:
    tag: latest
    pullPolicy: Never
  persistence:
    enabled: true
    backend: s3
    config:
      bucket: asya-results
      endpoint: http://localstack-s3.asya-system.svc.cluster.local:4566
      region: us-east-1
  x-sink:
    transport: sqs
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/state/checkpoints/results"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    scaling:
      enabled: true
      minReplicas: 1
  x-sump:
    transport: sqs
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/state/checkpoints/errors"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    scaling:
      enabled: true
      minReplicas: 1

gateway:
  routes:
    defaults:
      progress: true
      timeout: 60
  transports:
    rabbitmq:
      enabled: false
    sqs:
      enabled: true
      config:
        endpoint: "http://localstack-sqs.asya-system.svc.cluster.local:4566"
        region: "us-east-1"
        visibilityTimeout: 300
        waitTimeSeconds: 20
  env:
  - name: AWS_ACCESS_KEY_ID
    value: "test"
  - name: AWS_SECRET_ACCESS_KEY
    value: "test"
  - name: AWS_REGION
    value: "us-east-1"

crossplane:
  providerConfigs:
    install: false
  functions:
    flavorsEnabled: true
    flavorsVersion: "0.5.2"
  awsProviderConfig:
    name: localstack
    credentialsSource: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-creds
      key: credentials
    endpoint:
      enabled: true
      url: http://localstack-sqs.asya-system.svc.cluster.local:4566
      hostnameImmutable: true
    skipCredentialsValidation: true
    skipMetadataApiCheck: true
    skipRequestingAccountId: true
    skipRegionValidation: true
    s3UsePathStyle: true
  awsRegion: us-east-1
  awsAccountId: "000000000000"
  actorNamespace: asya-e2e
  irsa:
    enabled: false
  keda:
    authProvider: secret
    secretRef:
      name: aws-creds
      accessKeyIdKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY

injector:
  image:
    tag: latest
    pullPolicy: Never
  config:
    sidecarImage: ghcr.io/deliveryhero/asya-sidecar:latest
    sidecarImagePullPolicy: Never
    sqsEndpoint: http://localstack-sqs.asya-system.svc.cluster.local:4566
    gatewayURL: http://asya-gateway.asya-e2e.svc.cluster.local:8080
    awsCredsSecret: aws-creds
