# Test profile (values.yaml file): RabbitMQ + MinIO
#
# This is the default configuration for E2E tests using
# RabbitMQ for message transport and MinIO for object storage.

namespace: asya-e2e

localstack:
  enabled: false

transport:
  rabbitmq:
    enabled: true
  sqs:
    enabled: false

storage:
  minio:
    enabled: true
  s3:
    enabled: false

actors:
  namespace: asya-e2e
  transport: rabbitmq
  storage:
    type: minio
    endpoint: http://minio.asya-e2e.svc.cluster.local:9000
    bucket: asya-results
    resultsBucket: asya-results
    errorsBucket: asya-errors
    region: us-east-1
    accessKey: minioadmin
    secretKey: minioadmin

crew:
  image:
    pullPolicy: Never
  x-sink:
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway.asya-e2e.svc.cluster.local:8080"
      ASYA_S3_BUCKET: "asya-results"
      ASYA_S3_ENDPOINT: "http://minio.asya-e2e.svc.cluster.local:9000"
      ASYA_S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      ASYA_S3_RESULTS_PREFIX: ""
    scaling:
      enabled: true
      minReplicas: 1
  x-sump:
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway.asya-e2e.svc.cluster.local:8080"
      ASYA_S3_BUCKET: "asya-errors"
      ASYA_S3_ENDPOINT: "http://minio.asya-e2e.svc.cluster.local:9000"
      ASYA_S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      ASYA_S3_ERRORS_PREFIX: ""
    scaling:
      enabled: true
      minReplicas: 1

gateway:
  transports:
    rabbitmq:
      enabled: true
      config:
        url: amqp://guest:guest@asya-rabbitmq.asya-e2e.svc.cluster.local:5672/
        exchange: asya
        poolSize: 20
    sqs:
      enabled: false

crossplane:
  providers:
    aws:
      enabled: false
  providerConfigs:
    install: false
  kubernetesProviderConfig:
    name: in-cluster
    credentialsSource: InjectedIdentity
  actorNamespace: asya-e2e
  irsa:
    enabled: false
  rabbitmq:
    host: asya-rabbitmq.asya-e2e.svc.cluster.local
    port: 5672
    keda:
      secretRef:
        name: rabbitmq-secret
        hostKey: host

injector:
  image:
    tag: latest
    pullPolicy: Never
  config:
    sidecarImage: ghcr.io/deliveryhero/asya-sidecar:latest
    sidecarImagePullPolicy: Never
    gatewayURL: http://asya-gateway.asya-e2e.svc.cluster.local:8080
    rabbitmqURL: amqp://guest:guest@asya-rabbitmq.asya-e2e.svc.cluster.local:5672/
