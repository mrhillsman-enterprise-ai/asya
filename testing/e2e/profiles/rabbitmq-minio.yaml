# Test profile (values.yaml file): RabbitMQ + MinIO
#
# This is the default configuration for E2E tests using
# RabbitMQ for message transport and MinIO for object storage.

namespace: asya-e2e

localstack:
  enabled: false

transport:
  rabbitmq:
    enabled: true
  sqs:
    enabled: false

storage:
  minio:
    enabled: true
  s3:
    enabled: false

actors:
  namespace: asya-e2e
  transport: rabbitmq
  storage:
    type: minio
    endpoint: http://minio.asya-e2e.svc.cluster.local:9000
    bucket: asya-results
    resultsBucket: asya-results
    errorsBucket: asya-errors
    region: us-east-1
    accessKey: minioadmin
    secretKey: minioadmin

crew:
  image:
    pullPolicy: Never
  persistence:
    enabled: true
    backend: s3
    config:
      bucket: asya-results
      errorsBucket: asya-errors
      endpoint: http://minio.asya-e2e.svc.cluster.local:9000
      region: us-east-1
  x-sink:
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway-mesh.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/state/checkpoints/results"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
    scaling:
      enabled: true
      minReplicas: 1
  x-sump:
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway-mesh.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/state/checkpoints/errors"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
    scaling:
      enabled: true
      minReplicas: 1

gateway:
  transports:
    rabbitmq:
      enabled: true
      config:
        url: amqp://guest:guest@asya-rabbitmq.asya-e2e.svc.cluster.local:5672/
        exchange: asya
        poolSize: 20
    sqs:
      enabled: false
  env:
  - name: ASYA_A2A_API_KEY
    value: "test-api-key-e2e"
  - name: ASYA_A2A_JWT_JWKS_URL
    value: "http://asya-jwks-server.asya-e2e.svc.cluster.local/jwks.json"
  - name: ASYA_A2A_JWT_ISSUER
    value: "https://test-issuer.e2e"
  - name: ASYA_A2A_JWT_AUDIENCE
    value: "asya-gateway-e2e"

crossplane:
  providers:
    aws:
      enabled: false
  sidecar:
    image: ghcr.io/deliveryhero/asya-sidecar:latest
    imagePullPolicy: Never
    gatewayURL: http://asya-gateway-mesh.asya-e2e.svc.cluster.local:8080
    rabbitmqURL: amqp://guest:guest@asya-rabbitmq.asya-e2e.svc.cluster.local:5672/
  providerConfigs:
    install: false
  functions:
    flavorsEnabled: true
  kubernetesProviderConfig:
    name: in-cluster
    credentialsSource: InjectedIdentity
  actorNamespace: asya-e2e
  irsa:
    enabled: false
  rabbitmq:
    host: asya-rabbitmq.asya-e2e.svc.cluster.local
    port: 5672
    keda:
      secretRef:
        name: rabbitmq-secret
        hostKey: host
