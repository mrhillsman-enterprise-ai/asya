crossplane:
  awsProviderConfig:
    name: default
    credentialsSource: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-creds
      key: credentials
    endpoint:
      enabled: false
      url: ""
      hostnameImmutable: true
    skipCredentialsValidation: false
    skipMetadataApiCheck: false
    skipRequestingAccountId: false
    skipRegionValidation: false
    s3UsePathStyle: false
  awsRegion: us-east-1
  awsAccountId: "000000000000"
  actorNamespace: asya-e2e
  irsa:
    enabled: false
  keda:
    authProvider: podIdentity
    secretRef:
      name: ""
      accessKeyIdKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  functions:
    overlaysPackagePullPolicy: Never

injector:
  image:
    tag: latest
    pullPolicy: Never
  config:
    sidecarImage: ghcr.io/deliveryhero/asya-sidecar:latest
    sidecarImagePullPolicy: Never

gateway:
  image:
    repository: ghcr.io/deliveryhero/asya-gateway
    tag: latest
    pullPolicy: Never

  tests:
    image: ghcr.io/deliveryhero/asya-testing:latest
    imagePullPolicy: Never

  replicaCount: 1

  service:
    type: NodePort
    port: 8080
    nodePort: 30080
    meshType: NodePort
    meshNodePort: 30081

  config:
    port: "8080"

  transports:
    rabbitmq:
      enabled: false
      config:
        url: "amqp://guest:guest@asya-rabbitmq.asya-e2e.svc.cluster.local:5672/"
        exchange: "asya"
        poolSize: 20
    sqs:
      enabled: false
      config:
        endpoint: ""
        region: "us-east-1"
        visibilityTimeout: 30
        waitTimeSeconds: 2
    pubsub:
      enabled: false
      config:
        projectId: ""
        endpoint: ""

  postgresql:
    host: postgres.asya-e2e.svc.cluster.local
    port: 5432
    database: asya
    username: asya
    passwordSecretRef:
      name: postgres-secret
      key: password

  flowsConfig:
    flows:
    - name: test_echo
      entrypoint: test-echo
      description: Echo back the input message
      timeout: 120
      mcp:
        inputSchema:
          type: object
          properties:
            message:
              type: string
              description: Message to echo
          required: [message]
      a2a: {}
    - name: test_queue_health
      entrypoint: test-queue-health
      description: Test queue health monitoring with small retry values
      mcp:
        inputSchema:
          type: object
          properties:
            data:
              type: string
              description: Test data
          required: [data]
    - name: test_pipeline
      entrypoint: test-doubler
      route_next: [test-incrementer]
      description: Process value through doubler and incrementer pipeline
      timeout: 45
      mcp:
        inputSchema:
          type: object
          properties:
            value:
              type: number
              description: Value to process through pipeline
          required: [value]
      a2a: {}
    - name: test_error
      entrypoint: test-error
      description: Test error handling
      mcp:
        inputSchema:
          type: object
          properties:
            should_fail:
              type: boolean
              description: Whether to trigger an error
          required: [should_fail]
    - name: test_timeout
      entrypoint: test-timeout
      description: Test timeout handling
      timeout: 30
      mcp:
        inputSchema:
          type: object
          properties:
            sleep_seconds:
              type: number
              description: Duration to sleep in seconds
          required: [sleep_seconds]
    - name: test_timeout_cold
      entrypoint: test-timeout-cold
      description: Test gateway backstop race with cold-start actor (minReplicas=0)
      timeout: 15
      mcp:
        inputSchema:
          type: object
          properties:
            sleep_seconds:
              type: number
              description: Duration to sleep in seconds
          required: [sleep_seconds]
    - name: test_fanout
      entrypoint: test-fanout
      description: Create multiple messages via fan-out
      mcp:
        inputSchema:
          type: object
          properties:
            count:
              type: number
              description: Number of messages to create
          required: [count]
    - name: test_empty_response
      entrypoint: test-empty
      description: Test empty response handling
      mcp:
        inputSchema:
          type: object
          properties:
            message:
              type: string
              description: Test message
    - name: test_slow_boundary
      entrypoint: test-slow-boundary
      description: "Test slow processing at actor boundary (1.5s processing, generous timeout for SQS transit)"
      timeout: 30
      mcp:
        inputSchema:
          type: object
          properties:
            first_call:
              type: boolean
              description: Whether this is the first call
          required: [first_call]
      a2a: {}
    - name: test_nested_flow
      entrypoint: start-test-nested-flow
      description: Test nested if-else flow with level1 and level2 parameters
      timeout: 60
      mcp:
        inputSchema:
          type: object
          properties:
            level1:
              type: string
              description: First level decision (A or B)
            level2:
              type: string
              description: Second level decision (X or Y)
          required: [level1, level2]
    - name: test_unicode
      entrypoint: test-unicode
      description: Test Unicode character handling
      mcp:
        inputSchema:
          type: object
          properties:
            message:
              type: string
              description: Unicode message
    - name: test_large_payload
      entrypoint: test-large-payload
      description: Test large payload handling
      mcp:
        inputSchema:
          type: object
          properties:
            size_kb:
              type: number
              description: Size of payload in KB
    - name: test_nested
      entrypoint: test-nested
      description: Test nested JSON handling
      mcp:
        inputSchema:
          type: object
          properties:
            depth:
              type: number
              description: Nesting depth
    - name: test_multihop
      entrypoint: test-multihop-0
      route_next:
      - test-multihop-1
      - test-multihop-2
      - test-multihop-3
      - test-multihop-4
      - test-multihop-5
      - test-multihop-6
      - test-multihop-7
      - test-multihop-8
      - test-multihop-9
      - test-multihop-10
      - test-multihop-11
      - test-multihop-12
      - test-multihop-13
      - test-multihop-14
      description: Test multi-hop message processing through 15 actors
      timeout: 120
      mcp:
        inputSchema:
          type: object
          properties:
            message:
              type: string
              description: Initial message
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

actors:
  namespace: asya-e2e
  transport: rabbitmq
  storage:
    type: minio
    endpoint: http://minio.asya-e2e.svc.cluster.local:9000
    bucket: asya-results
    accessKey: minioadmin
    secretKey: minioadmin

crew:
  image:
    repository: ghcr.io/deliveryhero/asya-crew
    tag: latest
    pullPolicy: Never

  x-sink:
    enabled: true
    name: x-sink
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway-mesh.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/tmp/checkpoints/results"
      ASYA_SQS_WAIT_TIME_SECONDS: "2"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    scaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      pollingInterval: 5
      cooldownPeriod: 30
      queueLength: 5
    workload:
      kind: Deployment

  x-sump:
    enabled: true
    name: x-sump
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway-mesh.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/tmp/checkpoints/errors"
      ASYA_SQS_WAIT_TIME_SECONDS: "2"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    scaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      pollingInterval: 5
      cooldownPeriod: 30
      queueLength: 5
    workload:
      kind: Deployment

transport:
  rabbitmq:
    enabled: false
  sqs:
    enabled: false
  pubsub:
    enabled: false

storage:
  minio:
    enabled: false
  s3:
    enabled: false
  gcs:
    enabled: false
