crossplane:
  awsProviderConfig:
    name: default
    credentialsSource: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-creds
      key: credentials
    endpoint:
      enabled: false
      url: ""
      hostnameImmutable: true
    skipCredentialsValidation: false
    skipMetadataApiCheck: false
    skipRequestingAccountId: false
    skipRegionValidation: false
    s3UsePathStyle: false
  awsRegion: us-east-1
  awsAccountId: "000000000000"
  actorNamespace: asya-e2e
  irsa:
    enabled: false
  keda:
    authProvider: podIdentity
    secretRef:
      name: ""
      accessKeyIdKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  functions:
    overlaysPackagePullPolicy: Never

injector:
  image:
    tag: latest
    pullPolicy: Never
  config:
    sidecarImage: ghcr.io/deliveryhero/asya-sidecar:latest
    sidecarImagePullPolicy: Never

gateway:
  image:
    repository: ghcr.io/deliveryhero/asya-gateway
    tag: latest
    pullPolicy: Never

  tests:
    image: ghcr.io/deliveryhero/asya-testing:latest
    imagePullPolicy: Never

  replicaCount: 1

  service:
    type: NodePort
    port: 8080
    nodePort: 30080

  config:
    port: "8080"

  transports:
    rabbitmq:
      enabled: false
      config:
        url: "amqp://guest:guest@asya-rabbitmq.asya-e2e.svc.cluster.local:5672/"
        exchange: "asya"
        poolSize: 20
    sqs:
      enabled: false
      config:
        endpoint: ""
        region: "us-east-1"
        visibilityTimeout: 300
        waitTimeSeconds: 2
    pubsub:
      enabled: false
      config:
        projectId: ""
        endpoint: ""

  postgresql:
    host: postgres.asya-e2e.svc.cluster.local
    port: 5432
    database: asya
    username: asya
    passwordSecretRef:
      name: postgres-secret
      key: password

  routes:
    tools:
    - name: test_echo
      description: Echo back the input message
      parameters:
        message:
          type: string
          description: Message to echo
          required: true
      route: [test-echo]
      timeout: 120
    - name: test_queue_health
      description: Test queue health monitoring with small retry values
      parameters:
        data:
          type: string
          description: Test data
          required: true
      route: [test-queue-health]
    - name: test_pipeline
      description: Process value through doubler and incrementer pipeline
      parameters:
        value:
          type: number
          description: Value to process through pipeline
          required: true
      route: [test-doubler, test-incrementer]
      timeout: 45
    - name: test_error
      description: Test error handling
      parameters:
        should_fail:
          type: boolean
          description: Whether to trigger an error
          required: true
      route: [test-error]
    - name: test_timeout
      description: Test timeout handling
      parameters:
        sleep_seconds:
          type: number
          description: Duration to sleep in seconds
          required: true
      route: [test-timeout]
    - name: test_fanout
      description: Create multiple messages via fan-out
      parameters:
        count:
          type: number
          description: Number of messages to create
          required: true
      route: [test-fanout]
    - name: test_empty_response
      description: Test empty response handling
      parameters:
        message:
          type: string
          description: Test message
          required: false
      route: [test-empty]
    - name: test_slow_boundary
      description: |
        Test slow processing at actor boundary
        (1.5s processing, generous timeout for SQS transit)
      parameters:
        first_call:
          type: boolean
          description: Whether this is the first call
          required: true
      route: [test-slow-boundary]
      timeout: 30
    - name: test_nested_flow
      description: Test nested if-else flow with level1 and level2 parameters
      parameters:
        level1:
          type: string
          description: First level decision (A or B)
          required: true
        level2:
          type: string
          description: Second level decision (X or Y)
          required: true
      route: [start-test-nested-flow]
      timeout: 60
    - name: test_unicode
      description: Test Unicode character handling
      parameters:
        message:
          type: string
          description: Unicode message
          required: false
      route: [test-unicode]
    - name: test_large_payload
      description: Test large payload handling
      parameters:
        size_kb:
          type: number
          description: Size of payload in KB
          required: false
      route: [test-large-payload]
    - name: test_nested
      description: Test nested JSON handling
      parameters:
        depth:
          type: number
          description: Nesting depth
          required: false
      route: [test-nested]
    - name: test_multihop
      description: Test multi-hop message processing through 15 actors
      parameters:
        message:
          type: string
          description: Initial message
          required: false
      route:
      - test-multihop-0
      - test-multihop-1
      - test-multihop-2
      - test-multihop-3
      - test-multihop-4
      - test-multihop-5
      - test-multihop-6
      - test-multihop-7
      - test-multihop-8
      - test-multihop-9
      - test-multihop-10
      - test-multihop-11
      - test-multihop-12
      - test-multihop-13
      - test-multihop-14
      timeout: 120
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

actors:
  namespace: asya-e2e
  transport: rabbitmq
  storage:
    type: minio
    endpoint: http://minio.asya-e2e.svc.cluster.local:9000
    bucket: asya-results
    accessKey: minioadmin
    secretKey: minioadmin

crew:
  image:
    repository: ghcr.io/deliveryhero/asya-crew
    tag: latest
    pullPolicy: Never

  x-sink:
    enabled: true
    name: x-sink
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/tmp/checkpoints/results"
      ASYA_SQS_WAIT_TIME_SECONDS: "2"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    scaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      pollingInterval: 5
      cooldownPeriod: 30
      queueLength: 5
    workload:
      kind: Deployment

  x-sump:
    enabled: true
    name: x-sump
    transport: rabbitmq
    env:
      ASYA_GATEWAY_URL: "http://asya-gateway.asya-e2e.svc.cluster.local:8080"
      ASYA_PERSISTENCE_MOUNT: "/tmp/checkpoints/errors"
      ASYA_SQS_WAIT_TIME_SECONDS: "2"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    scaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      pollingInterval: 5
      cooldownPeriod: 30
      queueLength: 5
    workload:
      kind: Deployment

transport:
  rabbitmq:
    enabled: false
  sqs:
    enabled: false
  pubsub:
    enabled: false

storage:
  minio:
    enabled: false
  s3:
    enabled: false
  gcs:
    enabled: false
