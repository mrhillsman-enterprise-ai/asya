# Default values for asya-test-actors chart
# This chart deploys all test actors in a single release

# Transport name (required)
# Must reference a transport configured in the operator
# Common values: rabbitmq, sqs, pubsub
transport: rabbitmq

# GCP project ID (required for pubsub transport)
gcpProject: ""

# Common workload configuration for all actors
workload:
  image: ghcr.io/deliveryhero/asya-testing:latest
  imagePullPolicy: Never

# Test image configuration (for Helm test pods)
tests:
  image: ghcr.io/deliveryhero/asya-testing:latest
  imagePullPolicy: Never
