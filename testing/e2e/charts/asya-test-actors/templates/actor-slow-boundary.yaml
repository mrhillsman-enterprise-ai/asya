apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: test-slow-boundary
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-actors.labels" . | nindent 4 }}
spec:
  actor: test-slow-boundary
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ .Values.transport }}
  transport: {{ .Values.transport }}

  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    queueLength: 5

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ .Values.workload.image }}
          imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
          env:
          - name: ASYA_HANDLER
            value: asya_testing.handlers.{{ .Values.handlerMode }}.slow_then_fast_handler
          - name: ASYA_HANDLER_MODE
            value: {{ .Values.handlerMode }}
