# EnvironmentConfigs used by E2E test actors to exercise the overlay pipeline.
#
# - asya-test-actor: standard compute + scaling defaults applied to most test actors
# - asya-test-env-vars: extra env var used by multi-overlay test (actor-unicode)
#
# Both are cluster-scoped resources (EnvironmentConfig has no namespace).
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-actor
  labels:
    asya.sh/overlay: asya-test-actor
data:
  scaling:
    minReplicas: 1
    maxReplicas: 3
    queueLength: 10
  workload:
    template:
      spec:
        containers:
        - name: asya-runtime
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-env-vars
  labels:
    asya.sh/overlay: asya-test-env-vars
data:
  workload:
    template:
      spec:
        containers:
        - name: asya-runtime
          env:
          - name: OVERLAY_EXTRA_VAR
            value: from-overlay
