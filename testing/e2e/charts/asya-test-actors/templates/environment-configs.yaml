# EnvironmentConfigs used by E2E test actors to exercise the flavor pipeline.
#
# - asya-test-actor: standard compute + scaling defaults applied to most test actors
# - asya-test-env-vars: extra env var used by multi-flavor test (actor-unicode)
#
# Both are cluster-scoped resources (EnvironmentConfig has no namespace).
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-actor
  labels:
    asya.sh/flavor: asya-test-actor
data:
  scaling:
    minReplicaCount: 1
    maxReplicaCount: 3
    queueLength: 10
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-env-vars
  labels:
    asya.sh/flavor: asya-test-env-vars
data:
  env:
  - name: FLAVOR_EXTRA_VAR
    value: from-flavor
---
# Two toleration flavors used to verify list-append merge behavior.
# Tolerations are permissive (allow scheduling on tainted nodes) so they
# don't prevent pods from running on untainted Kind nodes.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-toleration-gpu
  labels:
    asya.sh/flavor: asya-test-toleration-gpu
data:
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
---
# Conflicting flavor: sets scaling.minReplicaCount=5 which conflicts with
# asya-test-actor's scaling.minReplicaCount=1 (same leaf key, different value).
# Used to verify that flavor conflicts surface as Fatal composition errors.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-scaling-conflict
  labels:
    asya.sh/flavor: asya-test-scaling-conflict
data:
  scaling:
    minReplicaCount: 5
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-toleration-spot
  labels:
    asya.sh/flavor: asya-test-toleration-spot
data:
  tolerations:
  - key: cloud.google.com/gke-spot
    operator: Equal
    value: "true"
    effect: NoSchedule
