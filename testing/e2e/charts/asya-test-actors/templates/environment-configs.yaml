# EnvironmentConfigs used by E2E test actors to exercise the flavor pipeline.
#
# - asya-test-actor: standard compute + scaling defaults applied to most test actors
# - asya-test-env-vars: extra env var used by multi-flavor test (actor-unicode)
#
# Both are cluster-scoped resources (EnvironmentConfig has no namespace).
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-actor
  labels:
    asya.sh/flavor: asya-test-actor
data:
  scaling:
    minReplicaCount: 1
    maxReplicaCount: 3
    queueLength: 10
  workload:
    template:
      spec:
        containers:
        - name: asya-runtime
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: asya-test-env-vars
  labels:
    asya.sh/flavor: asya-test-env-vars
data:
  workload:
    template:
      spec:
        containers:
        - name: asya-runtime
          env:
          - name: FLAVOR_EXTRA_VAR
            value: from-flavor
