apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: test-echo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-actors.labels" . | nindent 4 }}
spec:
  actor: test-echo
  transport: {{ .Values.transport }}
  flavors:
  - asya-test-actor

  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 5

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ .Values.workload.image }}
          imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
          env:
          - name: ASYA_HANDLER
            value: asya_testing.handlers.{{ .Values.handlerMode }}.echo_handler
          - name: ASYA_HANDLER_MODE
            value: {{ .Values.handlerMode }}
          - name: ASYA_INCLUDE_ROUTE_INFO
            value: 'true'
