{{- $hopCount := 15 -}}
{{- range $i := until $hopCount }}
---
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: test-multihop-{{ $i }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "asya-test-actors.labels" $ | nindent 4 }}
    asya.sh/test-type: multihop
    asya.sh/hop-index: "{{ $i }}"
spec:
  actor: test-multihop-{{ $i }}
  transport: {{ $.Values.transport }}
  {{- include "asya-test-actors.pubsub-spec" $ | nindent 2 }}
  flavors:
  - asya-test-actor

  scaling:
    enabled: true
    minReplicaCount: 1
    maxReplicaCount: 5
    pollingInterval: 5
    cooldownPeriod: 30
    queueLength: 5

  image: {{ $.Values.workload.image }}
  imagePullPolicy: {{ $.Values.workload.imagePullPolicy }}
  handler: asya_testing.handlers.payload.multihop_handler
  env:
  - name: HOP_NUMBER
    value: "{{ $i }}"
  - name: ASYA_GATEWAY_URL
    value: "http://asya-gateway.{{ $.Release.Namespace }}.svc.cluster.local:8080"
{{- end }}
