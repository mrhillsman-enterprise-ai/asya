apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-queue-exists"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-actors.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: {{ .Values.tests.image }}
    imagePullPolicy: {{ .Values.tests.imagePullPolicy }}
    {{- if eq .Values.transport "sqs" }}
    env:
    - name: AWS_REGION
      value: "us-east-1"
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: AWS_SECRET_ACCESS_KEY
    - name: AWS_ENDPOINT_URL
      value: "http://localstack-sqs.asya-system.svc.cluster.local:4566"
    {{- end }}
    {{- if eq .Values.transport "pubsub" }}
    env:
    - name: PUBSUB_EMULATOR_HOST
      value: "pubsub-emulator.asya-system.svc.cluster.local:8085"
    - name: PUBSUB_PROJECT_ID
      value: {{ .Values.pubsubProjectId | default "test-project" | quote }}
    {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        set -e

        # Test a sample actor (echo) to validate queue creation
        TEST_ACTOR="test-echo"
        echo "Testing queue existence for AsyncActor '$TEST_ACTOR'..."
        echo "Transport: {{ .Values.transport }}"
        echo "Queue name: $TEST_ACTOR"
        echo ""

        {{- if eq .Values.transport "rabbitmq" }}
        # RabbitMQ queue validation using rabbitmqctl
        echo "[.] Validating RabbitMQ queue..."

        QUEUE_NAME="asya-{{ .Release.Namespace }}-$TEST_ACTOR"
        RABBITMQ_POD="asya-rabbitmq-0"

        echo "Queue name: ${QUEUE_NAME}"
        echo "RabbitMQ pod: ${RABBITMQ_POD}"
        echo ""

        # Wait for queue to be created (max 300 seconds)
        MAX_ATTEMPTS=300
        ATTEMPT=0

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))

          # Check if queue exists using rabbitmqctl
          if kubectl exec -n {{ .Release.Namespace }} ${RABBITMQ_POD} -- rabbitmqctl list_queues name messages consumers -q 2>/dev/null | grep -q "^${QUEUE_NAME}"; then
            echo "[+] Queue '${QUEUE_NAME}' exists in RabbitMQ"

            # Get queue details
            QUEUE_INFO=$(kubectl exec -n {{ .Release.Namespace }} ${RABBITMQ_POD} -- rabbitmqctl list_queues name messages consumers -q 2>/dev/null | grep "^${QUEUE_NAME}")
            MESSAGES=$(echo "$QUEUE_INFO" | awk '{print $2}')
            CONSUMERS=$(echo "$QUEUE_INFO" | awk '{print $3}')

            echo "  Messages: ${MESSAGES}"
            echo "  Consumers: ${CONSUMERS}"
            echo ""
            echo "[+] RabbitMQ queue validation passed!"
            exit 0
          fi

          echo "[.] Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: Queue not found yet, waiting..."
          sleep 1
        done

        echo "[-] FAILED: Queue '${QUEUE_NAME}' does not exist in RabbitMQ after ${MAX_ATTEMPTS} seconds (5 minutes)"
        echo ""
        echo "Possible causes:"
        echo "  1. Crossplane has not created the queue yet (check operator logs)"
        echo "  2. Transport configuration is incorrect in Crossplane composition"
        echo "  3. RabbitMQ pod is not accessible"
        echo "  4. Queue creation failed in Crossplane provider"
        echo ""
        echo "Debug steps:"
        echo "  kubectl logs -n crossplane-system -l pkg.crossplane.io/revision"
        echo "  kubectl exec -n {{ .Release.Namespace }} ${RABBITMQ_POD} -- rabbitmqctl list_queues"
        echo ""
        echo "AsyncActor status:"
        kubectl get asyncactor -n {{ .Release.Namespace }} "${TEST_ACTOR}" -o yaml
        exit 1

        {{- else if eq .Values.transport "sqs" }}
        # SQS queue validation
        echo "[.] Validating SQS queue..."

        AWS_REGION="${AWS_REGION:-us-east-1}"
        QUEUE_NAME="asya-{{ .Release.Namespace }}-$TEST_ACTOR"

        # Build endpoint flag for awscli v1 compatibility (v1 ignores AWS_ENDPOINT_URL)
        ENDPOINT_FLAG=""
        if [ -n "$AWS_ENDPOINT_URL" ]; then
          ENDPOINT_FLAG="--endpoint-url $AWS_ENDPOINT_URL"
        fi

        echo "Region: ${AWS_REGION}"
        echo "Queue name: ${QUEUE_NAME}"
        echo ""

        # Wait for queue to be created (max 300 seconds)
        MAX_ATTEMPTS=300
        ATTEMPT=0

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))

          # Try to get queue URL
          if QUEUE_URL=$(aws sqs get-queue-url $ENDPOINT_FLAG --queue-name "${QUEUE_NAME}" --region "${AWS_REGION}" --output text 2>/dev/null); then
            echo "[+] Queue '${QUEUE_NAME}' exists in SQS"
            echo "  Queue URL: ${QUEUE_URL}"

            # Get queue attributes
            ATTRS=$(aws sqs get-queue-attributes $ENDPOINT_FLAG --queue-url "${QUEUE_URL}" \
              --attribute-names ApproximateNumberOfMessages ApproximateNumberOfMessagesNotVisible VisibilityTimeout \
              --region "${AWS_REGION}" --output json 2>/dev/null || echo "{}")

            MESSAGES=$(echo "$ATTRS" | grep -o '"ApproximateNumberOfMessages":"[0-9]*"' | cut -d'"' -f4 || echo "0")
            INFLIGHT=$(echo "$ATTRS" | grep -o '"ApproximateNumberOfMessagesNotVisible":"[0-9]*"' | cut -d'"' -f4 || echo "0")
            VISIBILITY=$(echo "$ATTRS" | grep -o '"VisibilityTimeout":"[0-9]*"' | cut -d'"' -f4 || echo "unknown")

            echo "  Messages available: ${MESSAGES}"
            echo "  Messages in flight: ${INFLIGHT}"
            echo "  Visibility timeout: ${VISIBILITY}s"
            echo ""
            echo "[+] SQS queue validation passed!"
            exit 0
          fi

          echo "[.] Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: Queue not found yet, waiting..."
          sleep 1
        done

        echo "[-] FAILED: Queue '${QUEUE_NAME}' does not exist in SQS after ${MAX_ATTEMPTS} seconds (5 minutes)"
        echo ""
        echo "Possible causes:"
        echo "  1. Crossplane has not created the queue yet (check operator logs)"
        echo "  2. AWS credentials are not configured correctly"
        echo "  3. Transport configuration is incorrect in Crossplane composition"
        echo "  4. Queue creation failed in Crossplane provider"
        echo "  5. IAM permissions are missing for sqs:GetQueueUrl"
        echo ""
        echo "Debug steps:"
        echo "  kubectl logs -n crossplane-system -l pkg.crossplane.io/revision"
        echo "  aws sqs list-queues --region ${AWS_REGION}"
        echo ""
        echo "AsyncActor status:"
        kubectl get asyncactor -n {{ .Release.Namespace }} "${TEST_ACTOR}" -o yaml
        exit 1

        {{- else if eq .Values.transport "pubsub" }}
        # Pub/Sub subscription validation via emulator REST API
        echo "[.] Validating Pub/Sub subscription..."

        PROJECT_ID="${PUBSUB_PROJECT_ID}"
        SUBSCRIPTION_NAME="asya-{{ .Release.Namespace }}-$TEST_ACTOR"
        EMULATOR="${PUBSUB_EMULATOR_HOST}"

        echo "Project: ${PROJECT_ID}"
        echo "Subscription: ${SUBSCRIPTION_NAME}"
        echo "Emulator: ${EMULATOR}"
        echo ""

        # Wait for subscription to be created (max 300 seconds)
        MAX_ATTEMPTS=300
        ATTEMPT=0

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))

          # Check subscription via emulator REST API (python3 available in testing image)
          HTTP_CODE=$(python3 -c "
        import urllib.request, urllib.error
        try:
            urllib.request.urlopen('http://${EMULATOR}/v1/projects/${PROJECT_ID}/subscriptions/${SUBSCRIPTION_NAME}')
            print(200)
        except urllib.error.HTTPError as e:
            print(e.code)
        except Exception:
            print(0)
          ")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "[+] Subscription '${SUBSCRIPTION_NAME}' exists in Pub/Sub emulator"
            echo ""
            echo "[+] Pub/Sub subscription validation passed!"
            exit 0
          fi

          echo "[.] Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: Subscription not found yet (HTTP ${HTTP_CODE}), waiting..."
          sleep 1
        done

        echo "[-] FAILED: Subscription '${SUBSCRIPTION_NAME}' does not exist in Pub/Sub emulator after ${MAX_ATTEMPTS} seconds (5 minutes)"
        echo ""
        echo "Possible causes:"
        echo "  1. Crossplane has not created the subscription yet (check operator logs)"
        echo "  2. GCP provider is not configured correctly"
        echo "  3. Pub/Sub emulator is not accessible"
        echo "  4. Subscription creation failed in Crossplane provider"
        echo ""
        echo "Debug steps:"
        echo "  kubectl logs -n crossplane-system -l pkg.crossplane.io/revision"
        echo "  wget -q -O - http://${EMULATOR}/v1/projects/${PROJECT_ID}/subscriptions"
        echo ""
        echo "AsyncActor status:"
        kubectl get asyncactor -n {{ .Release.Namespace }} "${TEST_ACTOR}" -o yaml 2>/dev/null || echo "(kubectl not available in busybox)"
        exit 1

        {{- else }}
        # Unknown transport
        echo "[-] FAILED: Unknown transport '{{ .Values.transport }}'"
        echo ""
        echo "Supported transports: rabbitmq, sqs, pubsub"
        exit 1
        {{- end }}
