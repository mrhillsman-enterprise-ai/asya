apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-asyncactor-spec"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-actors.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: {{ .Values.tests.image }}
    imagePullPolicy: {{ .Values.tests.imagePullPolicy }}
    command:
      - /bin/sh
      - -c
      - |
        set -e

        # Test a sample actor (echo) to validate common spec configuration
        TEST_ACTOR="test-echo"
        echo "Testing AsyncActor '$TEST_ACTOR' spec configuration..."

        # Check scaling configuration
        SCALING_ENABLED=$(kubectl get asyncactor $TEST_ACTOR -n {{ .Release.Namespace }} -o jsonpath='{.spec.scaling.enabled}')
        if [ "$SCALING_ENABLED" != "true" ]; then
          echo "[-] Scaling should be enabled"
          exit 1
        fi
        echo "[+] Scaling is enabled"

        MIN_REPLICAS=$(kubectl get asyncactor $TEST_ACTOR -n {{ .Release.Namespace }} -o jsonpath='{.spec.scaling.minReplicaCount}')
        if [ "$MIN_REPLICAS" != "1" ]; then
          echo "[-] Min replicas mismatch: expected 1, got $MIN_REPLICAS"
          exit 1
        fi
        echo "[+] Min replicas: $MIN_REPLICAS"

        MAX_REPLICAS=$(kubectl get asyncactor $TEST_ACTOR -n {{ .Release.Namespace }} -o jsonpath='{.spec.scaling.maxReplicaCount}')
        if [ "$MAX_REPLICAS" != "10" ]; then
          echo "[-] Max replicas mismatch: expected 10, got $MAX_REPLICAS"
          exit 1
        fi
        echo "[+] Max replicas: $MAX_REPLICAS"

        # Check image is set
        IMAGE=$(kubectl get asyncactor $TEST_ACTOR -n {{ .Release.Namespace }} -o jsonpath='{.spec.image}')
        if [ -z "$IMAGE" ]; then
          echo "[-] spec.image should be set"
          exit 1
        fi
        echo "[+] Image: $IMAGE"

        # Check handler is set
        HANDLER=$(kubectl get asyncactor $TEST_ACTOR -n {{ .Release.Namespace }} -o jsonpath='{.spec.handler}')
        if [ -z "$HANDLER" ]; then
          echo "[-] spec.handler should be set"
          exit 1
        fi
        echo "[+] Handler: $HANDLER"

        # Check pythonExecutable defaults to python3
        PYTHON_EXEC=$(kubectl get asyncactor $TEST_ACTOR -n {{ .Release.Namespace }} -o jsonpath='{.spec.pythonExecutable}')
        if [ "$PYTHON_EXEC" != "python3" ]; then
          echo "[-] spec.pythonExecutable should default to 'python3', got '$PYTHON_EXEC'"
          exit 1
        fi
        echo "[+] Python executable: $PYTHON_EXEC"

        echo ""
        echo "All spec validation tests passed!"
