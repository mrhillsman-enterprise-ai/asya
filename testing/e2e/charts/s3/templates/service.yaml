{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: localstack-s3
  namespace: {{ .Release.Namespace }}
  labels:
    app: s3
    app.kubernetes.io/name: localstack-s3
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
  - port: 4566
    targetPort: 4566
    protocol: TCP
    name: edge
    {{- if and .Values.service.nodePort (eq (.Values.service.type | default "ClusterIP") "NodePort") }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
  selector:
    app: s3
{{- end }}
