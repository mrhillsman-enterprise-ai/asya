enabled: true
projectId: test-project

service:
  type: NodePort
  nodePort: 30085

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Mock OAuth token server for Crossplane GCP provider.
# The Terraform-based provider requires OAuth token exchange even
# when using a custom endpoint (emulator). This mock returns a
# dummy Bearer token for any POST request.
mockOAuth:
  enabled: true
