{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubsub-emulator
  namespace: {{ .Release.Namespace }}
  labels:
    app: pubsub-emulator
    app.kubernetes.io/name: pubsub-emulator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pubsub-emulator
  template:
    metadata:
      labels:
        app: pubsub-emulator
    spec:
      containers:
      - name: pubsub-emulator
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
        command:
        - gcloud
        - beta
        - emulators
        - pubsub
        - start
        - --host-port=0.0.0.0:8085
        ports:
        - containerPort: 8085
          name: pubsub
        env:
        - name: PUBSUB_PROJECT_ID
          value: {{ .Values.projectId | quote }}
        readinessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
{{- end }}
