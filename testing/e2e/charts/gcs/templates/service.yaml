{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fake-gcs
  namespace: {{ .Release.Namespace }}
  labels:
    app: fake-gcs
    app.kubernetes.io/name: fake-gcs
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
  - port: 4443
    targetPort: 4443
    protocol: TCP
    name: http
    {{- if and .Values.service.nodePort (eq (.Values.service.type | default "ClusterIP") "NodePort") }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
  selector:
    app: fake-gcs
{{- end }}
