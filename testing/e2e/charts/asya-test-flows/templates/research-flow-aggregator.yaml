---
# Fan-in aggregator for the research_flow E2E test.
#
# Runs the asya_crew split-key aggregator, which:
# - Collects N+1 fan-in slices (1 parent payload + N sub-agent results)
# - Emits a merged message once all slices arrive
# - Uses the state proxy sidecar for durable state storage (S3 or GCS)
#
# The aggregator reads x-asya-fan-in header via ABI yield protocol
# for fan-in coordination.
{{- $sp := .Values.stateProxy }}
{{- $connectorImage := dict "val" $sp.connector.image }}
{{- if not $connectorImage.val }}
  {{- if eq $sp.backend "s3" }}
    {{- $_ := set $connectorImage "val" "ghcr.io/deliveryhero/asya-state-proxy-s3-buffered-lww:dev" }}
  {{- else if eq $sp.backend "gcs" }}
    {{- $_ := set $connectorImage "val" "ghcr.io/deliveryhero/asya-state-proxy-gcs-buffered-lww:dev" }}
  {{- end }}
{{- end }}
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: research-flow-aggregator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-flows.labels" . | nindent 4 }}
    asya.sh/flow: research-flow
    asya.sh/actor-type: aggregator
spec:
  actor: research-flow-aggregator
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ .Values.transport }}
  transport: {{ .Values.transport }}
  {{- include "asya-test-flows.pubsub-spec" . | nindent 2 }}

  stateProxy:
    - name: fanin
      mount:
        path: /state/checkpoints
      connector:
        image: {{ $connectorImage.val }}
        env:
          - name: STATE_BUCKET
            value: {{ $sp.config.bucket | quote }}
          {{- if eq $sp.backend "s3" }}
          {{- with $sp.config.endpoint }}
          - name: AWS_ENDPOINT_URL
            value: {{ . | quote }}
          {{- end }}
          {{- with $sp.config.region }}
          - name: AWS_REGION
            value: {{ . | quote }}
          {{- end }}
          {{- with $sp.config.accessKey }}
          - name: AWS_ACCESS_KEY_ID
            value: {{ . | quote }}
          {{- end }}
          {{- with $sp.config.secretKey }}
          - name: AWS_SECRET_ACCESS_KEY
            value: {{ . | quote }}
          {{- end }}
          {{- else if eq $sp.backend "gcs" }}
          {{- with $sp.config.project }}
          - name: GCS_PROJECT
            value: {{ . | quote }}
          {{- end }}
          {{- with $sp.config.emulatorHost }}
          - name: STORAGE_EMULATOR_HOST
            value: {{ . | quote }}
          {{- end }}
          {{- end }}

  sidecar:
    env:
      - name: ASYA_SQS_VISIBILITY_TIMEOUT
        value: "30"

  scaling:
    enabled: {{ .Values.scaling.enabled }}
    minReplicaCount: 1
    maxReplicaCount: 5
    pollingInterval: {{ .Values.scaling.pollingInterval }}
    cooldownPeriod: {{ .Values.scaling.cooldownPeriod }}
    queueLength: 5

  image: {{ .Values.crewImage | default "ghcr.io/deliveryhero/asya-crew:latest" }}
  imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
  handler: asya_crew.fanin.split_key.aggregator
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
