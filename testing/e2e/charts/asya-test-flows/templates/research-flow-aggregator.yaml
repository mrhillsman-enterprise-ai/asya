---
# Fan-in aggregator for the research_flow E2E test.
#
# Runs the asya_crew S3 split-key aggregator, which:
# - Collects N+1 fan-in slices (1 parent payload + N sub-agent results)
# - Emits a merged message once all slices arrive
# - Uses the state proxy sidecar for durable S3-backed state storage
#
# The aggregator accesses message metadata via VFS (pending migration to ABI)
# including the x-asya-fan-in header for fan-in coordination.
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: research-flow-aggregator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-flows.labels" . | nindent 4 }}
    asya.sh/flow: research-flow
    asya.sh/actor-type: aggregator
spec:
  actor: research-flow-aggregator
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ .Values.transport }}
  transport: {{ .Values.transport }}

  scaling:
    enabled: {{ .Values.scaling.enabled }}
    minReplicas: 1
    maxReplicas: 5
    pollingInterval: {{ .Values.scaling.pollingInterval }}
    cooldownPeriod: {{ .Values.scaling.cooldownPeriod }}
    queueLength: 5

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ .Values.crewImage | default "ghcr.io/deliveryhero/asya-crew:latest" }}
          imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
          env:
          - name: ASYA_HANDLER
            value: asya_crew.fanin.s3_split_key.aggregator
          # Fan-in aggregator accesses x-asya-fan-in header via VFS.
          # No special handler mode needed - VFS is always available.
          # State proxy: maps Python file I/O to S3-backed HTTP API.
          # fanin:/state/fanin:write=buffered means OS file ops under
          # /state/fanin/ are proxied to S3 by the state proxy sidecar.
          - name: ASYA_STATE_PROXY_MOUNTS
            value: "fanin:/state/fanin:write=buffered"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
