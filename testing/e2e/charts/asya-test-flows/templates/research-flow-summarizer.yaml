---
# research-flow-summarizer: post-aggregation summarizer for the research_flow.
# Receives the merged payload from the fan-in aggregator and adds a summary.
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: research-flow-summarizer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-flows.labels" . | nindent 4 }}
    asya.sh/flow: research-flow
    asya.sh/actor-type: handler
spec:
  actor: research-flow-summarizer
  compositionSelector:
    matchLabels:
      asya.sh/transport: {{ .Values.transport }}
  transport: {{ .Values.transport }}
  {{- include "asya-test-flows.pubsub-spec" . | nindent 2 }}

  scaling:
    enabled: {{ .Values.scaling.enabled }}
    minReplicaCount: {{ .Values.scaling.minReplicaCount }}
    maxReplicaCount: {{ .Values.scaling.maxReplicaCount }}
    pollingInterval: {{ .Values.scaling.pollingInterval }}
    cooldownPeriod: {{ .Values.scaling.cooldownPeriod }}
    queueLength: {{ .Values.scaling.queueLength }}

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ .Values.workload.image }}
          imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
          env:
          - name: ASYA_HANDLER
            value: asya_testing.flows.research_flow.flow.summarizer
