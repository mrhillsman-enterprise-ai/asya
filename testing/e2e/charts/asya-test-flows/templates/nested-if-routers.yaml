---
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: start-test-nested-flow
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "asya-test-flows.labels" . | nindent 4 }}
    flow: nested-if
    actor-type: router
spec:
  transport: {{ .Values.transport }}

  scaling:
    enabled: {{ .Values.scaling.enabled }}
    minReplicas: {{ .Values.scaling.minReplicas }}
    maxReplicas: {{ .Values.scaling.maxReplicas }}
    queueLength: {{ .Values.scaling.queueLength }}

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: {{ .Values.workload.image }}
          imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
          env:
          - name: ASYA_HANDLER
            value: asya_testing.flows.nested_if.compiled.routers.start_test_nested_flow
          - name: ASYA_HANDLER_MODE
            value: envelope
          {{- include "asya-test-flows.nested-if-handler-env" . | nindent 10 }}
