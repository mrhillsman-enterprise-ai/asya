transport: sqs

workload:
  image: localhost/asya-runtime:latest
  imagePullPolicy: Never

# Image for asya-crew actors (aggregator and other crew-based actors).
# Uses the same tag as the rest of the cluster deployment.
crewImage: ghcr.io/deliveryhero/asya-crew:latest

stateProxy:
  backend: s3
  connector:
    image: ""
  config:
    bucket: asya-results
    # S3-specific
    endpoint: ""
    region: us-east-1
    accessKey: ""
    secretKey: ""
    # GCS-specific
    project: ""
    emulatorHost: ""

scaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  pollingInterval: 5
  cooldownPeriod: 30
  queueLength: 5
