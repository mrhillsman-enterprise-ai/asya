    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 500ms
      timeout: 500ms
      retries: 20
      start_period: 1s

  asya-retry-mro-sidecar:
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
    logging: *default-logging
    depends_on:
