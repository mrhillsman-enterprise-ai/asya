  # =========================================================================
  # Retry test actors
  # =========================================================================

  # Actor that always fails with ValueError, configured with retry (max 3 attempts)
  asya-retry-fail-runtime:
    build:
      context: ../../../../src/asya-testing
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
    env_file: *runtime-env-files
    environment:
      ASYA_HANDLER: asya_testing.handlers.payload.error_handler
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 5s
    volumes:
    - asya-retry-fail-sockets:/var/run/asya
    - ../../../../src/asya-runtime/asya_runtime.py:/opt/asya/asya_runtime.py:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 500ms
      timeout: 500ms
      retries: 20
      start_period: 1s

  asya-retry-fail-sidecar:
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
    logging: *default-logging
    depends_on:
      asya-retry-fail-runtime:
        condition: service_healthy
      queue-setup:
        condition: service_completed_successfully
    env_file: *sidecar-env-files
    environment:
      ASYA_ACTOR_NAME: test-retry-fail
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 30s
      ASYA_RESILIENCY_RETRY_POLICY: constant
      ASYA_RESILIENCY_RETRY_MAX_ATTEMPTS: 3
      ASYA_RESILIENCY_RETRY_INITIAL_INTERVAL: 1s
      ASYA_RESILIENCY_RETRY_MAX_INTERVAL: 2s
      ASYA_RESILIENCY_RETRY_JITTER: "false"
    volumes:
    - asya-retry-fail-sockets:/var/run/asya

  # Actor that fails with ValueError, configured as non-retryable
  asya-retry-nonretryable-runtime:
    build:
      context: ../../../../src/asya-testing
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
    env_file: *runtime-env-files
    environment:
      ASYA_HANDLER: asya_testing.handlers.payload.error_handler
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 5s
    volumes:
    - asya-retry-nonretryable-sockets:/var/run/asya
    - ../../../../src/asya-runtime/asya_runtime.py:/opt/asya/asya_runtime.py:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 500ms
      timeout: 500ms
      retries: 20
      start_period: 1s

  asya-retry-nonretryable-sidecar:
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
    logging: *default-logging
    depends_on:
      asya-retry-nonretryable-runtime:
        condition: service_healthy
      queue-setup:
        condition: service_completed_successfully
    env_file: *sidecar-env-files
    environment:
      ASYA_ACTOR_NAME: test-retry-nonretryable
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 30s
      ASYA_RESILIENCY_RETRY_POLICY: constant
      ASYA_RESILIENCY_RETRY_MAX_ATTEMPTS: 3
      ASYA_RESILIENCY_RETRY_INITIAL_INTERVAL: 1s
      ASYA_RESILIENCY_RETRY_MAX_INTERVAL: 2s
      ASYA_RESILIENCY_RETRY_JITTER: "false"
      ASYA_RESILIENCY_NON_RETRYABLE_ERRORS: ValueError
    volumes:
    - asya-retry-nonretryable-sockets:/var/run/asya

  # Actor that fails on attempt 1 and succeeds on attempt 2 (reads status.attempt via VFS)
  asya-retry-succeed-runtime:
    build:
      context: ../../../../src/asya-testing
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
