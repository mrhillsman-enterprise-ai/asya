  # Actor that always fails, with retry policy and large actor timeout.
  # Used in retry+SLA test to verify SLA pre-check takes precedence over retries.
  asya-sla-retry-runtime:
    build:
      context: ../../../../src/asya-testing
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
    env_file: *runtime-env-files
    environment:
      ASYA_HANDLER: asya_testing.handlers.payload.error_handler
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 5s
    volumes:
    - asya-sla-retry-sockets:/var/run/asya
    - ../../../../src/asya-runtime/asya_runtime.py:/opt/asya/asya_runtime.py:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 500ms
      timeout: 500ms
      retries: 20
      start_period: 1s

  asya-sla-retry-sidecar:
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
    logging: *default-logging
    depends_on:
      asya-sla-retry-runtime:
