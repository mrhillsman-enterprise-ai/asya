        condition: service_healthy
      queue-setup:
        condition: service_completed_successfully
    env_file: *sidecar-env-files
    environment:
      ASYA_ACTOR_NAME: test-retry-mro
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 30s
      ASYA_RESILIENCY_RETRY_POLICY: constant
      ASYA_RESILIENCY_RETRY_MAX_ATTEMPTS: 3
      ASYA_RESILIENCY_RETRY_INITIAL_INTERVAL: 1s
      ASYA_RESILIENCY_RETRY_MAX_INTERVAL: 2s
      ASYA_RESILIENCY_RETRY_JITTER: "false"
      ASYA_RESILIENCY_NON_RETRYABLE_ERRORS: Exception
    volumes:
    - asya-retry-mro-sockets:/var/run/asya

  # =========================================================================
  # SLA enforcement test actors
  # =========================================================================

  # Actor with long handler sleep and large actor timeout.
  # Used in SLA pipeline test to verify effectiveTimeout = min(ACTOR_TIMEOUT, remaining_SLA)
  asya-sla-slow-runtime:
    build:
      context: ../../../../src/asya-testing
      dockerfile: Dockerfile
    logging: *default-logging
    command: ["python3", "/opt/asya/asya_runtime.py"]
    env_file: *runtime-env-files
    environment:
      ASYA_HANDLER: asya_testing.handlers.payload.timeout_handler
      ASYA_RESILIENCY_ACTOR_TIMEOUT: 5s
    volumes:
    - asya-sla-slow-sockets:/var/run/asya
    - ../../../../src/asya-runtime/asya_runtime.py:/opt/asya/asya_runtime.py:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/asya/asya-runtime.sock"]
      interval: 500ms
      timeout: 500ms
      retries: 20
      start_period: 1s

  asya-sla-slow-sidecar:
    build:
      context: ../../../../src/asya-sidecar
      dockerfile: Dockerfile
