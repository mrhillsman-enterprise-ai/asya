      asya-unicode-sidecar:
        condition: service_started
      asya-null-sidecar:
        condition: service_started
      asya-cond-sidecar:
        condition: service_started
      asya-nested-sidecar:
        condition: service_started
      asya-echo-v2-sidecar:
        condition: service_started
      asya-invalid-route-sidecar:
