# Profile: RabbitMQ + MinIO
#
# Full stateful actor pipeline: RabbitMQ transport + MinIO state storage
#
# Usage: docker compose -f profiles/rabbitmq.yml up

include:
- path: ../../../shared/compose/rabbitmq.yml
- path: ../../../shared/compose/minio.yml
- path: ../compose/actors.yml

services:
  tester:
    extends:
      file: ../compose/tester.yml
      service: tester
    depends_on:
      queue-setup:
        condition: service_completed_successfully
      test-actors-waiter:
        condition: service_completed_successfully
