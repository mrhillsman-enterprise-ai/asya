apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: start-test-nested-flow
  namespace: asya-e2e
spec:
  actor: start-test-nested-flow
  transport: TRANSPORT_PLACEHOLDER

  scaling:
    enabled: true
    minReplicaCount: 1
    maxReplicaCount: 5
    queueLength: 5

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          env:
          - name: ASYA_HANDLER
            value: testing.e2e.flows.nested_if.compiled_routers.start_test_nested_flow
---
