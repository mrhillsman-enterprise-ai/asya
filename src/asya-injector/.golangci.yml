run:
  timeout: 15m
  tests: true
  modules-download-mode: readonly
  concurrency: 3

output:
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
  - errcheck # Check error returns are handled
  - gosec # Security-focused linter
  - staticcheck # Advanced static analysis
  - govet # Standard Go vet
  - gocyclo # Cyclomatic complexity
  - goconst # Repeated strings that should be constants
  - misspell # Spelling mistakes
  - nolintlint # Validate //nolint directives
  - ineffassign # Detect ineffectual assignments

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  gosec:
    excludes:
    - G404 # Use of weak random number generator (math/rand)
    - G112 # HTTP server timeouts
    - G306 # File permissions
    - G304 # File inclusion via variable
    - G115 # Integer overflow conversion

  gocyclo:
    min-complexity: 30

  goconst:
    min-len: 3
    min-occurrences: 3
    ignore-tests: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
  # Exclude test files from some checks
  - path: '_test\.go'
    linters:
    - gocyclo
    - errcheck
    - gosec
    - goconst
  # Exclude goconst for boolean string literals
  - text: 'string `(true|false)` has \d+ occurrences'
    linters:
    - goconst
