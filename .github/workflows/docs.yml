name: Deploy Site

on:
  push:
    branches: [main]
    paths:
    - 'docs/**'
    - 'website/**'
    - 'mkdocs.yml'
    - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
    - 'docs/**'
    - 'website/**'
    - 'mkdocs.yml'
    - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
        cache-dependency-path: 'docs/mkdocs/requirements.txt'

    - name: Install dependencies
      run: pip install -r docs/mkdocs/requirements.txt

    - name: Build MkDocs site
      run: mkdocs build -d site/docs

    - name: Copy landing page
      run: |
        cp -r website/* site/
        echo "asya.sh" > site/CNAME

    - name: Upload artifact
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: site
        path: site/
        retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
        cache-dependency-path: 'docs/mkdocs/requirements.txt'

    - name: Install dependencies
      run: pip install -r docs/mkdocs/requirements.txt

    - name: Build MkDocs site
      run: mkdocs build -d site/docs

    - name: Copy landing page
      run: |
        cp -r website/* site/
        echo "asya.sh" > site/CNAME

    - name: Deploy to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        cname: asya.sh
