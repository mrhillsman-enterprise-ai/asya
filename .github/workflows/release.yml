name: Release

on:
  release:
    types: [created, published]

concurrency:
  group: release-management
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.action == 'published'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        install-docker: "true"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        {
          printf "version=%s\n" "${VERSION}"
          printf "tag=%s\n" "${TAG}"
        } >> "$GITHUB_OUTPUT"

    - name: Build and push images
      env:
        TAG: ${{ steps.version.outputs.version }}
        REGISTRY: ghcr.io/${{ github.repository_owner }}
      run: |
        source .venv/bin/activate
        ./src/build-images.sh --push --tag "$TAG" --registry "$REGISTRY"

    - name: Tag images as latest
      if: github.event.release.prerelease == false
      env:
        VERSION: ${{ steps.version.outputs.version }}
        REGISTRY: ghcr.io/${{ github.repository_owner }}
      run: |
        IMAGES=(
          "asya-operator"
          "asya-gateway"
          "asya-sidecar"
          "asya-crew"
          "asya-testing"
        )

        for img in "${IMAGES[@]}"; do
          echo "[.] Tagging ${REGISTRY}/${img}:${VERSION} as latest"
          docker tag "${REGISTRY}/${img}:${VERSION}" "${REGISTRY}/${img}:latest"
          docker push "${REGISTRY}/${img}:latest"
          echo "[+] Published ${REGISTRY}/${img}:latest"
        done

    - name: Create release summary
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF
        ## Published Docker Images

        Version: \`${{ steps.version.outputs.version }}\`

        The following images have been published to GitHub Container Registry:

        - \`ghcr.io/${{ github.repository_owner }}/asya-operator:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-gateway:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-sidecar:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-crew:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-testing:${{ steps.version.outputs.version }}\`
        EOF

        if [ "${{ github.event.release.prerelease }}" == "false" ]; then
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF

        All images have also been tagged as \`latest\`.
        EOF
        fi

  publish-helm-charts:
    name: Publish Helm charts
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event.action == 'published'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - name: Update chart versions
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        for chart in deploy/helm-charts/*/Chart.yaml; do
          sed -i "s/^version:.*/version: ${VERSION}/" "$chart"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "$chart"
        done

    - name: Package Helm charts
      run: |
        mkdir -p .deploy/charts
        for chart_dir in deploy/helm-charts/*/; do
          echo "[.] Packaging ${chart_dir}..."
          helm package "${chart_dir}" -d .deploy/charts
        done

        # Verify charts were packaged
        chart_count=$(find .deploy/charts -name "*.tgz" | wc -l)
        echo "[+] Packaged ${chart_count} charts"
        if [ "${chart_count}" -eq 0 ]; then
          echo "[-] No charts were packaged"
          exit 1
        fi
        ls -la .deploy/charts/

    - name: Checkout gh-pages
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages

    - name: Update Helm repository
      run: |
        mkdir -p gh-pages/charts
        cp .deploy/charts/*.tgz gh-pages/charts/
        helm repo index gh-pages/charts --url https://asya.sh/charts
        echo "[+] Updated Helm repository index"

    - name: Deploy to gh-pages
      working-directory: gh-pages
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add charts/
        if git diff --cached --quiet; then
          echo "[!] No changes to commit (charts already published)"
        else
          git commit -m "Publish Helm charts for ${{ github.event.release.tag_name }}"
          git push
          echo "[+] Published charts to gh-pages"
        fi

    - name: Add Helm charts to release summary
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF

        ## Published Helm Charts

        Version: \`${{ steps.version.outputs.version }}\`

        Charts are available at: https://asya.sh/charts

        Add the repository:
        \`\`\`bash
        helm repo add asya https://asya.sh/charts
        helm repo update
        \`\`\`

        Install charts:
        \`\`\`bash
        helm install asya-operator asya/asya-operator --version ${{ steps.version.outputs.version }}
        helm install asya-gateway asya/asya-gateway --version ${{ steps.version.outputs.version }}
        \`\`\`
        EOF
