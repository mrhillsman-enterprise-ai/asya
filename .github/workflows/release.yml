name: Release

on:
  release:
    types: [created, published]

concurrency:
  group: release-management
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.action == 'published'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        install-docker: "true"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        {
          printf "version=%s\n" "${VERSION}"
          printf "tag=%s\n" "${TAG}"
        } >> "$GITHUB_OUTPUT"

    - name: Build and push images
      env:
        TAG: ${{ steps.version.outputs.version }}
        REGISTRY: ghcr.io/${{ github.repository_owner }}
      run: |
        source .venv/bin/activate
        ./src/build-images.sh --push --tag "$TAG" --registry "$REGISTRY"

    - name: Tag images as latest
      if: github.event.release.prerelease == false
      env:
        VERSION: ${{ steps.version.outputs.version }}
        REGISTRY: ghcr.io/${{ github.repository_owner }}
      run: |
        IMAGES=(
          "asya-gateway"
          "asya-sidecar"
          "asya-injector"
          "asya-crew"
          "asya-lab"
          "asya-testing"
          "asya-ui"
          "function-asya-flavors"
        )

        for img in "${IMAGES[@]}"; do
          echo "[.] Tagging ${REGISTRY}/${img}:${VERSION} as latest"
          docker tag "${REGISTRY}/${img}:${VERSION}" "${REGISTRY}/${img}:latest"
          docker push "${REGISTRY}/${img}:latest"
          echo "[+] Published ${REGISTRY}/${img}:latest"
        done

    - name: Create release summary
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF
        ## Published Docker Images

        Version: \`${{ steps.version.outputs.version }}\`

        The following images have been published to GitHub Container Registry:

        - \`ghcr.io/${{ github.repository_owner }}/asya-gateway:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-sidecar:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-injector:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-crew:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-lab:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-testing:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/asya-ui:${{ steps.version.outputs.version }}\`
        - \`ghcr.io/${{ github.repository_owner }}/function-asya-flavors:${{ steps.version.outputs.version }}\`
        EOF

        if [ "${{ github.event.release.prerelease }}" == "false" ]; then
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF

        All versioned images have also been tagged as \`latest\`.
        EOF
        fi

  reserve-image-names:
    name: Reserve placeholder image names
    runs-on: ubuntu-latest
    if: github.event.action == 'published'
    permissions:
      packages: write
    strategy:
      matrix:
        name:
        - asya-magic
        - asya-sdk
        - asya-workbench
        - asya-dashboard
        - asya-webhook
        - function-asya-overlays

    steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Reserve image name
      run: |
        IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}"
        echo "[.] Reserving ${IMAGE_NAME}:reserved"
        docker pull alpine:3.20
        docker tag alpine:3.20 "${IMAGE_NAME}:reserved"
        docker push "${IMAGE_NAME}:reserved"
        echo "[+] Reserved ${IMAGE_NAME}:reserved"

  publish-helm-charts:
    name: Publish Helm charts
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event.action == 'published'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - name: Update chart versions
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        for chart in deploy/helm-charts/*/Chart.yaml; do
          sed -i "s/^version:.*/version: ${VERSION}/" "$chart"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "$chart"
        done

    - name: Package base Helm charts
      run: |
        mkdir -p .deploy/charts
        # Package all charts except asya-playground (it depends on the others)
        for chart_dir in deploy/helm-charts/*/; do
          chart_name=$(basename "$chart_dir")
          if [ "$chart_name" = "asya-playground" ]; then
            echo "[.] Skipping ${chart_name} (will package after dependencies are published)"
            continue
          fi
          echo "[.] Packaging ${chart_dir}..."
          helm package "${chart_dir}" -d .deploy/charts
        done

        echo "[+] Packaged charts:"
        ls -la .deploy/charts/

        # Verify charts were packaged
        chart_count=$(find .deploy/charts -name "*.tgz" | wc -l)
        echo "[+] Packaged ${chart_count} charts"
        if [ "${chart_count}" -eq 0 ]; then
          echo "[-] No charts were packaged"
          exit 1
        fi
        ls -la .deploy/charts/

    - name: Checkout gh-pages
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages

    - name: Publish base charts to gh-pages
      run: |
        mkdir -p gh-pages/charts
        echo "[.] Copying base charts to gh-pages..."
        cp .deploy/charts/*.tgz gh-pages/charts/
        echo "[.] Updating Helm repository index..."
        helm repo index gh-pages/charts --url https://asya.sh/charts
        echo "[+] Charts in gh-pages/charts:"
        ls -la gh-pages/charts/

    - name: Deploy base charts to gh-pages
      working-directory: gh-pages
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add charts/
        if git diff --cached --quiet; then
          echo "[!] No changes to commit (charts already published)"
        else
          git commit -m "Publish Helm charts for ${{ github.event.release.tag_name }}"
          git push
          echo "[+] Published charts to gh-pages"
        fi

    - name: Package asya-playground with local dependencies
      run: |
        # Re-index with local URLs so helm downloads from localhost, not asya.sh
        # (GitHub Pages hasn't deployed the push yet)
        helm repo index gh-pages/charts --url http://localhost:8879

        python3 -m http.server 8879 --directory gh-pages/charts &
        SERVER_PID=$!
        trap 'kill $SERVER_PID 2>/dev/null' EXIT
        sleep 1
        curl -sf http://localhost:8879/index.yaml > /dev/null || { echo "[-] Local chart server failed to start"; exit 1; }

        # Temporarily redirect asya chart deps to local server
        sed -i 's|https://asya.sh/charts|http://localhost:8879|g' deploy/helm-charts/asya-playground/Chart.yaml
        helm repo add asya-local http://localhost:8879
        helm repo update

        echo "[.] Building asya-playground dependencies..."
        helm dependency build deploy/helm-charts/asya-playground

        kill $SERVER_PID 2>/dev/null || true

        # Restore Chart.yaml with production URLs before packaging
        git checkout deploy/helm-charts/asya-playground/Chart.yaml
        rm -f deploy/helm-charts/asya-playground/Chart.lock

        echo "[.] Packaging asya-playground..."
        helm package deploy/helm-charts/asya-playground -d .deploy/charts

        # Copy to gh-pages and re-index with production URLs
        cp .deploy/charts/asya-playground-*.tgz gh-pages/charts/
        helm repo index gh-pages/charts --url https://asya.sh/charts
        echo "[+] All charts packaged:"
        ls -la gh-pages/charts/

    - name: Deploy asya-playground to gh-pages
      working-directory: gh-pages
      run: |
        git add charts/
        if git diff --staged --quiet; then
          echo "[!] No changes to commit"
        else
          git commit -m "Publish asya-playground for ${{ github.event.release.tag_name }}"
          git push
          echo "[+] asya-playground published"
        fi

    - name: Add Helm charts to release summary
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF

        ## Published Helm Charts

        Version: \`${{ steps.version.outputs.version }}\`

        Charts are available at: https://asya.sh/charts

        Add the repository:
        \`\`\`bash
        helm repo add asya https://asya.sh/charts
        helm repo update
        \`\`\`

        Install charts:
        \`\`\`bash
        helm install asya-gateway asya/asya-gateway --version ${{ steps.version.outputs.version }}
        \`\`\`
        EOF
