name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
- title: 'Important Changes'
  labels:
  - 'feature'
  - 'feat'
  - 'major'
  - 'breaking'
  - 'breaking-change'
- title: 'Other Changes'
  labels:
  - '*'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
    - 'major'
    - 'breaking'
    - 'breaking-change'
  minor:
    labels:
    - 'minor'
    - 'feature'
    - 'feat'
  patch:
    labels:
    - 'patch'
    - 'fix'
    - 'bugfix'
    - 'bug'
    - 'documentation'
    - 'docs'
    - 'chore'
    - 'ci'
    - 'build'
    - 'dependencies'
    - 'deps'
    - 'test'
    - 'tests'
    - 'testing'
    - 'performance'
    - 'optimization'
  default: patch

autolabeler:
- label: 'docs'
  files:
  - '**/*.md'
  - 'docs/**/*'
- label: 'tests'
  files:
  - 'testing/**/*'
  - '**/*_test.go'
  - '**/test_*.py'
- label: 'ci'
  files:
  - '.github/**/*'
- label: 'deps'
  files:
  - 'go.mod'
  - 'go.sum'
  - '**/requirements*.txt'
  - '**/pyproject.toml'
- label: 'asya-operator'
  files:
  - 'src/asya-operator/**/*'
- label: 'asya-gateway'
  files:
  - 'src/asya-gateway/**/*'
- label: 'asya-sidecar'
  files:
  - 'src/asya-sidecar/**/*'
- label: 'asya-runtime'
  files:
  - 'src/asya-runtime/**/*'
- label: 'asya-crew'
  files:
  - 'src/asya-crew/**/*'

template: |
  $CHANGES

  ## Docker Images

  All images are published to GitHub Container Registry:

  - `ghcr.io/$OWNER/asya-operator:$RESOLVED_VERSION`
  - `ghcr.io/$OWNER/asya-gateway:$RESOLVED_VERSION`
  - `ghcr.io/$OWNER/asya-sidecar:$RESOLVED_VERSION`
  - `ghcr.io/$OWNER/asya-crew:$RESOLVED_VERSION`
  - `ghcr.io/$OWNER/asya-testing:$RESOLVED_VERSION`

  ## Contributors

  $CONTRIBUTORS
