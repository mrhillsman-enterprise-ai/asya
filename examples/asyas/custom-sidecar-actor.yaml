# Actor with custom sidecar configuration
# Demonstrates all sidecar customization options

apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: custom-sidecar-actor
  namespace: my-project
spec:
  actor: custom-sidecar-actor
  transport: sqs

  # Custom sidecar configuration
  sidecar:
    # Pin to a specific version (replace with an actual published tag)
    image: ghcr.io/deliveryhero/asya-sidecar:latest
    imagePullPolicy: Always

    # Custom resource limits
    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 128Mi

    # Additional environment variables for the sidecar
    env:
    - name: ASYA_LOG_LEVEL
      value: debug
    - name: ENABLE_TRACING
      value: "true"
    - name: JAEGER_ENDPOINT
      value: http://jaeger-collector:14268/api/traces
    - name: CUSTOM_TIMEOUT
      value: "30"

  scaling:
    enabled: true
    minReplicaCount: 0
    maxReplicaCount: 10
    queueLength: 5

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: custom-runtime:latest
          env:
          - name: ASYA_HANDLER
            value: "handlers.process"
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
