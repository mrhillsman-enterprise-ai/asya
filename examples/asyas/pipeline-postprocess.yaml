# Multi-actor pipeline: Stage 3 - Formatting results
# CPU-bound, fast processing with high parallelism

apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: postprocess
  namespace: my-project
spec:
  actor: postprocess
  transport: sqs

  scaling:
    enabled: true
    minReplicaCount: 0
    maxReplicaCount: 20 # High parallelism again
    queueLength: 10

  image: result-formatter:latest
  handler: formatter.format_output
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
