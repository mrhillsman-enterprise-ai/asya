# Multi-actor pipeline: Stage 1 - Text preprocessing
# CPU-bound, fast processing with high parallelism

apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: preprocess
  namespace: my-project
spec:
  actor: preprocess
  transport: sqs

  scaling:
    enabled: true
    minReplicaCount: 0
    maxReplicaCount: 20 # High parallelism for fast CPU work
    queueLength: 10

  image: text-preprocessor:latest
  handler: preprocessor.clean_text
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
