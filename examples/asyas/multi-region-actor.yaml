# Multi-Region Actor Deployment Example
#
# This example demonstrates using spec.actor to deploy the same logical actor
# across multiple regions/clusters with different resource names.
#
# Use case: Deploy "text-processor" actor in EU and US regions, both consuming
# from the same queue (asya-production-text-processor) but with region-specific
# resource names for cluster management.
#
# Key concepts:
# - metadata.name: Kubernetes resource name (must be unique in namespace)
# - spec.actor: Logical actor identity for queue naming and routing (can be same across resources)
# - Queue name format: asya-{namespace}-{spec.actor}

apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: text-processor-eu
  namespace: production
  labels:
    # Flow label for grouping related actors
    asya.sh/flow: document-processing
    # Custom labels for filtering
    region: eu-central-1
spec:
  # Logical actor name - used for queue naming and routing
  # Queue: asya-production-text-processor
  actor: text-processor
  transport: sqs

  scaling:
    enabled: true
    minReplicas: 0
    maxReplicas: 20
    queueLength: 10

  workload:
    kind: Deployment
    template:
      metadata:
        labels:
          region: eu-central-1
      spec:
        nodeSelector:
          topology.kubernetes.io/region: eu-central-1
        containers:
        - name: asya-runtime
          image: my-registry/text-processor:v1.0.0
          env:
          - name: ASYA_HANDLER
            value: text_processor.process
          - name: REGION
            value: eu-central-1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

---
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: text-processor-us
  namespace: production
  labels:
    asya.sh/flow: document-processing
    region: us-east-1
spec:
  # Same logical actor name - both regions consume from same queue
  actor: text-processor
  transport: sqs

  scaling:
    enabled: true
    minReplicas: 0
    maxReplicas: 20
    queueLength: 10

  workload:
    kind: Deployment
    template:
      metadata:
        labels:
          region: us-east-1
      spec:
        nodeSelector:
          topology.kubernetes.io/region: us-east-1
        containers:
        - name: asya-runtime
          image: my-registry/text-processor:v1.0.0
          env:
          - name: ASYA_HANDLER
            value: text_processor.process
          - name: REGION
            value: us-east-1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

# kubectl commands:
# kubectl get asya                                     # Shows ACTOR column (from spec.actor)
# kubectl get asya -l asya.sh/flow=document-processing # Filter by flow
# kubectl get asya -l region=eu-central-1              # Filter by region
