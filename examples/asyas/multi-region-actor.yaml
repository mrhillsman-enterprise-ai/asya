# Multi-Region Actor Deployment Example
#
# This example demonstrates using the asya.sh/actor label to deploy the same
# logical actor across multiple regions/clusters with different resource names.
#
# Use case: Deploy "text-processor" actor in EU and US regions, both consuming
# from the same queue (asya-production-text-processor) but with region-specific
# resource names for cluster management.
#
# Key concepts:
# - metadata.name: Kubernetes resource name (must be unique in namespace)
# - asya.sh/actor label: Logical actor name for routing (can be same across resources)
# - Queue name format: asya-{namespace}-{actor-label-value}
#
# Without the label, actor name defaults to metadata.name

apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: text-processor-eu
  namespace: production
  labels:
    # Logical actor name - used for queue naming and routing
    # Queue: asya-production-text-processor
    asya.sh/actor: text-processor
    # Flow label for grouping related actors
    asya.sh/flow: document-processing
    # Custom labels for filtering
    region: eu-central-1
spec:
  transport: sqs

  scaling:
    enabled: true
    minReplicas: 0
    maxReplicas: 20
    queueLength: 10

  workload:
    kind: Deployment
    template:
      metadata:
        labels:
          region: eu-central-1
      spec:
        nodeSelector:
          topology.kubernetes.io/region: eu-central-1
        containers:
        - name: asya-runtime
          image: my-registry/text-processor:v1.0.0
          env:
          - name: ASYA_HANDLER
            value: text_processor.process
          - name: REGION
            value: eu-central-1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

---
apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: text-processor-us
  namespace: production
  labels:
    # Same logical actor name - both regions consume from same queue
    asya.sh/actor: text-processor
    asya.sh/flow: document-processing
    region: us-east-1
spec:
  transport: sqs

  scaling:
    enabled: true
    minReplicas: 0
    maxReplicas: 20
    queueLength: 10

  workload:
    kind: Deployment
    template:
      metadata:
        labels:
          region: us-east-1
      spec:
        nodeSelector:
          topology.kubernetes.io/region: us-east-1
        containers:
        - name: asya-runtime
          image: my-registry/text-processor:v1.0.0
          env:
          - name: ASYA_HANDLER
            value: text_processor.process
          - name: REGION
            value: us-east-1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

# kubectl commands:
# kubectl get asya                                    # Shows ACTOR column
# kubectl get asya -l asya.sh/actor=text-processor    # Filter by actor name
# kubectl get asya -l asya.sh/flow=document-processing # Filter by flow
# kubectl get asya -l region=eu-central-1             # Filter by region
