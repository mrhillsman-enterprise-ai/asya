# Multi-actor pipeline: Stage 2 - Model inference
# GPU-bound, slow processing with limited parallelism

apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: inference
  namespace: my-project
spec:
  actor: inference
  transport: sqs

  scaling:
    enabled: true
    minReplicaCount: 0
    maxReplicaCount: 5 # Limited by GPU availability
    queueLength: 2

  workload:
    kind: Deployment
    template:
      spec:
        containers:
        - name: asya-runtime
          image: bert-inference:latest
          env:
          - name: ASYA_HANDLER
            value: "model.predict"
          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
            limits:
              nvidia.com/gpu: 1
              cpu: 4000m
              memory: 16Gi
