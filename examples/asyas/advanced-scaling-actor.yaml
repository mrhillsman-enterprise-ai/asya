apiVersion: asya.sh/v1alpha1
kind: AsyncActor
metadata:
  name: advanced-scaling-actor
  namespace: my-project
  labels:
    app: advanced-scaling-actor
spec:
  actor: advanced-scaling-actor
  transport: sqs

  scaling:
    enabled: true
    minReplicaCount: 0
    maxReplicaCount: 50
    pollingInterval: 10
    cooldownPeriod: 60
    queueLength: 10

    advanced:
      formula: "ceil(queueLength / 10)"
      target: "10"
      activationTarget: "5"
      metricType: "AverageValue"
      restoreToOriginalReplicaCount: false

  workload:
    kind: Deployment
    template:
      metadata:
        labels:
          app: advanced-scaling-actor
      spec:
        containers:
        - name: asya-runtime
          image: python:3.13-slim
          imagePullPolicy: IfNotPresent
          env:
          - name: ASYA_HANDLER
            value: "handlers.process"
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 512Mi
